or:#eadfff;font-size:14px;font-weight:500}.hero .en{margin:0;font-size:15px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px 13px;width:min(100%,315px);margin:28px auto 16px}.card{position:relative;min-height:145px;padding:10px 9px 11px;border:0;border-radius:9px;color:#fff;background:linear-gradient(rgba(18,9,36,.96),rgba(2,1,8,.95));box-shadow:inset 0 0 0 1px rgba(207,158,255,.58),inset 0 0 18px rgba(113,49,196,.34),0 0 0 1px rgba(98,31,215,.9),0 0 10px rgba(173,83,255,.95),0 0 30px rgba(105,35,255,.75);cursor:pointer;text-align:center;appearance:none}.card:before{content:"";position:absolute;inset:-7px;border-radius:12px;border:2px solid rgba(166,82,255,.64);clip-path:polygon(9% 0,91% 0,100% 11%,100% 89%,91% 100%,9% 100%,0 89%,0 11%);box-shadow:inset 0 0 10px rgba(207,139,255,.58),0 0 13px rgba(152,59,255,.85)}.card:after{content:"";position:absolute;inset:-2px;border-radius:10px;background:linear-gradient(90deg,transparent 0 10%,rgba(243,220,255,.86) 10.5% 11.5%,transparent 12% 88%,rgba(243,220,255,.74) 88.5% 89.5%,transparent 90%),linear-gradient(0deg,transparent 0 8%,rgba(196,104,255,.78) 8.4% 9.4%,transparent 10% 90%,rgba(196,104,255,.78) 90.4% 91.4%,transparent 92%);opacity:.55;pointer-events:none}.card:hover,.card:focus-visible,.card.active{filter:brightness(1.15);outline:0;box-shadow:inset 0 0 0 1px rgba(242,221,255,.82),inset 0 0 20px rgba(144,60,232,.48),0 0 0 1px rgba(203,118,255,.98),0 0 12px rgba(234,198,255,.95),0 0 35px rgba(148,65,255,.92)}.flag{position:relative;width:112px;height:60px;margin:0 auto 8px;overflow:hidden;border-radius:8px 10px 9px 7px;box-shadow:inset 0 0 12px rgba(255,255,255,.2),inset 0 -12px 18px rgba(0,0,0,.28),0 6px 10px rgba(0,0,0,.38),0 0 11px rgba(255,32,80,.28);transform:perspective(120px) rotateY(-6deg)}.flag:after{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 38% 12%,rgba(255,255,255,.55),transparent 25%),linear-gradient(105deg,transparent 0 23%,rgba(255,255,255,.26) 3 <body>
<main class="poster" aria-label="Secret Language Trade language selector">
<div class="globe" aria-hidden="true"></div><div class="city left" aria-hidden="true"><span class="tower"></span><span class="tower"></span><span class="tower"></span><span class="tower"></span></div><div class="city right" aria-hidden="true"><span class="tower"></span><span class="tower"></span><span class="tower"></span><span class="tower"></span></div><span class="beam one" aria-hidden="true"></span><span class="beam two" aria-hidden="true"></span><span class="beam three" aria-hidden="true"></span>

</main>
<script>const cards=document.querySelectorAll('.card');cards.forEach(card=>card.addEventListener('click',()=>{cards.forEach(i=>{i.classList.remove('active');i.setAttribute('aria-pressed','false')});card.classList.add('active');card.setAttribute('aria-pressed','true');document.documentElement.dataset.language=card.dataset.lang}))</script>
