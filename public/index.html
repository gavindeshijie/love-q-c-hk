<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Secret Language Trade</title>
    <meta
      name="description"
      content="Secret Language Trade multilingual mobile language selection page."
    >
    <style>
      :root {
        color-scheme: dark;
        --poster-width: 853;
        --poster-height: 1280;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #030006;
        font-family: "Noto Sans SC", "Noto Sans", Arial, sans-serif;
      }

      body {
        display: grid;
        justify-items: center;
        color: #fff;
        overflow-x: hidden;
      }

      .language-home {
        position: relative;
        width: min(100vw, 853px);
        background: #030006;
        line-height: 0;
        isolation: isolate;
      }

      .language-home__art {
        display: block;
        width: 100%;
        height: auto;
        user-select: none;
        -webkit-user-drag: none;
        pointer-events: none;
      }

      .entry {
        position: absolute;
        z-index: 2;
        display: block;
        border-radius: 7%;
        touch-action: manipulation;
        -webkit-tap-highlight-color: rgba(198, 92, 255, 0.24);
      }

      .entry:focus-visible {
        outline: 2px solid rgba(244, 211, 255, 0.98);
        outline-offset: 2px;
        box-shadow: 0 0 22px rgba(202, 80, 255, 0.9);
      }

      .entry--china {
        left: 11.5%;
        top: 18.1%;
        width: 37.1%;
        height: 23.1%;
      }

      .entry--singapore {
        left: 51.4%;
        top: 18.1%;
        width: 37.1%;
        height: 23.1%;
      }

      .entry--thailand {
        left: 11.5%;
        top: 42.3%;
        width: 37.1%;
        height: 23.1%;
      }

      .entry--vietnam {
        left: 51.4%;
        top: 42.3%;
        width: 37.1%;
        height: 23.1%;
      }

      .entry--malaysia {
        left: 11.5%;
        top: 66.4%;
        width: 37.1%;
        height: 21.7%;
      }

      .entry--laos {
        left: 51.4%;
        top: 66.4%;
        width: 37.1%;
        height: 21.7%;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </head>
  <body>
    <main class="language-home" aria-label="Secret Language Trade language entrance">
      <h1 class="sr-only">私语贸易欢迎您</h1>
      <img
        class="language-home__art"
        src="assets/language-home/original-home.jpg?v=product-compact-v1-20260628"
        alt="私语贸易欢迎您，多语言国家入口"
        width="853"
        height="1280"
        decoding="async"
        fetchpriority="high"
      >
      <a class="entry entry--china" href="china/?v=product-compact-v1-20260628" aria-label="进入中文中国地区价格"></a>
      <a class="entry entry--singapore" href="singapore/?v=product-compact-v1-20260628" aria-label="进入新加坡英文价格"></a>
      <a class="entry entry--thailand" href="thailand/?v=product-compact-v1-20260628" aria-label="进入泰国价格"></a>
      <a class="entry entry--vietnam" href="vietnam/?v=product-compact-v1-20260628" aria-label="进入越南价格"></a>
      <a class="entry entry--malaysia" href="malaysia/?v=product-compact-v1-20260628" aria-label="进入马来西亚价格"></a>
      <a class="entry entry--laos" href="laos/?v=product-compact-v1-20260628" aria-label="进入老挝价格"></a>
    </main>
  </body>
</html>
