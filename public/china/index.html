<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>华语专区 | Secret Language Trade</title>
    <style>
      :root {
        --bg: #020006;
        --ink: #f6edff;
        --muted: #cfc6d5;
        --pink: #ff56df;
        --hot-pink: #ff91ea;
        --blue: #0bb6ff;
        --violet: #9c55ff;
        --gold: #ffbd42;
        --glass: rgba(7, 4, 13, 0.84);
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        color: var(--ink);
        overflow-x: hidden;
      }

      .poster {
        position: relative;
        isolation: isolate;
        width: min(100vw, 430px);
        min-height: 100svh;
        aspect-ratio: 590 / 1280;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 25%, rgba(41, 53, 255, 0.4), transparent 12%),
          radial-gradient(ellipse at 50% 42%, rgba(146, 15, 255, 0.26), transparent 35%),
          linear-gradient(180deg, #010003 0%, #030008 48%, #010003 100%);
      }

      .poster::before,
      .poster::after {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        width: 12px;
        z-index: -1;
        opacity: 0.74;
      }

      .poster::before {
        left: 0;
        background:
          radial-gradient(circle at 7px 7px, rgba(57, 91, 255, 0.96) 0 1.6px, transparent 2.8px),
          radial-gradient(circle at 4px 19px, rgba(0, 210, 255, 0.78) 0 1.3px, transparent 2.6px),
          repeating-linear-gradient(180deg, transparent 0 12px, rgba(18, 67, 255, 0.64) 13px 16px, transparent 17px 31px),
          linear-gradient(90deg, rgba(3, 3, 10, 0.1), rgba(33, 78, 255, 0.48), rgba(4, 1, 15, 0.02));
        background-size: 12px 32px, 12px 32px, 100% 32px, 100% 100%;
        filter: drop-shadow(0 0 7px #1d5cff);
      }

      .poster::after {
        right: 0;
        background:
          radial-gradient(circle at 5px 7px, rgba(57, 91, 255, 0.96) 0 1.6px, transparent 2.8px),
          radial-gradient(circle at 8px 19px, rgba(0, 210, 255, 0.78) 0 1.3px, transparent 2.6px),
          repeating-linear-gradient(180deg, transparent 0 12px, rgba(18, 67, 255, 0.64) 13px 16px, transparent 17px 31px),
          linear-gradient(270deg, rgba(3, 3, 10, 0.1), rgba(33, 78, 255, 0.48), rgba(4, 1, 15, 0.02));
        background-size: 12px 32px, 12px 32px, 100% 32px, 100% 100%;
        filter: drop-shadow(0 0 7px #1d5cff);
      }

      .starfield,
      .energy,
      .lightning,
      .world,
      .slogan,
      .offers,
      .catalog {
        position: relative;
        z-index: 1;
      }

      .starfield {
        position: absolute;
        inset: 0;
        z-index: -2;
        opacity: 0.2;
        -webkit-mask-image: linear-gradient(180deg, #000 0 53%, rgba(0, 0, 0, 0.45) 68%, rgba(0, 0, 0, 0.22) 100%);
        mask-image: linear-gradient(180deg, #000 0 53%, rgba(0, 0, 0, 0.45) 68%, rgba(0, 0, 0, 0.22) 100%);
        background:
          radial-gradient(circle at 18% 8%, rgba(255, 142, 245, 0.7) 0 1px, transparent 2px),
          radial-gradient(circle at 80% 12%, rgba(30, 143, 255, 0.65) 0 1px, transparent 2px),
          radial-gradient(circle at 58% 19%, rgba(255, 255, 255, 0.7) 0 1px, transparent 2px),
          radial-gradient(circle at 33% 38%, rgba(24, 94, 255, 0.75) 0 1px, transparent 2px),
          radial-gradient(circle at 69% 62%, rgba(255, 90, 226, 0.55) 0 1px, transparent 2px),
          radial-gradient(circle at 49% 79%, rgba(255, 255, 255, 0.55) 0 1px, transparent 2px);
        background-size: 96px 116px, 72px 88px, 130px 160px, 110px 140px, 88px 120px, 150px 190px;
      }

      .energy {
        position: absolute;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        opacity: 0.62;
      }

      .energy span {
        position: absolute;
        left: 6%;
        right: 6%;
        top: var(--top);
        height: 2px;
        transform: rotate(var(--angle));
        background: linear-gradient(90deg, transparent, var(--color), rgba(255, 255, 255, 0.9), transparent);
        box-shadow: 0 0 12px var(--color), 0 0 24px var(--color);
        opacity: var(--alpha);
      }

      .offers {
        width: 80%;
        margin: 30px auto 0;
      }

      .offer {
        position: relative;
        display: grid;
        grid-template-columns: 36px 1fr;
        align-items: center;
        min-height: 39px;
        color: rgba(245, 239, 255, 0.86);
        font-size: clamp(14px, 4.25vw, 18px);
        letter-spacing: 1px;
        text-shadow: 0 0 8px rgba(255, 255, 255, 0.42);
        white-space: nowrap;
      }

      .offer::after {
        content: "";
        position: absolute;
        left: 38px;
        right: 0;
        bottom: 0;
        height: 1px;
        background: linear-gradient(90deg, rgba(255, 66, 225, 0.8), rgba(255, 255, 255, 0.65), rgba(33, 52, 255, 0.58), transparent);
        box-shadow: 0 0 8px rgba(255, 61, 227, 0.55);
      }

      .number {
        display: grid;
        place-items: center;
        width: 29px;
        height: 29px;
        border-radius: 50%;
        color: #fff;
        font-weight: 700;
        font-size: clamp(14px, 4vw, 18px);
        border: 2px solid currentColor;
        background:
          radial-gradient(circle, rgba(255, 255, 255, 0.16), transparent 45%),
          #06030a;
        box-shadow:
          0 0 0 3px rgba(255, 255, 255, 0.05),
          0 0 10px currentColor,
          inset 0 0 10px currentColor;
      }

      .offer:nth-child(1) .number,
      .hot {
        color: var(--pink);
      }

      .offer:nth-child(2) .number,
      .cyan {
        color: var(--blue);
      }

      .offer:nth-child(3) .number,
      .purple {
        color: var(--violet);
      }

      .world {
        width: 70%;
        height: 140px;
        margin: 8px auto 0;
        display: grid;
        place-items: center;
      }

      .world::before {
        content: "";
        position: absolute;
        top: 3px;
        left: 50%;
        width: 126px;
        height: 126px;
        transform: translateX(-50%);
        border-radius: 50%;
        background:
          linear-gradient(20deg, transparent 47%, rgba(255, 255, 255, 0.3) 48% 49%, transparent 50%),
          linear-gradient(95deg, transparent 43%, rgba(255, 255, 255, 0.2) 44% 45%, transparent 46%),
          repeating-linear-gradient(0deg, transparent 0 14px, rgba(114, 159, 255, 0.2) 15px 16px),
          repeating-linear-gradient(90deg, transparent 0 18px, rgba(114, 159, 255, 0.18) 19px 20px),
          radial-gradient(circle at 50% 36%, #3e77ff 0, #071a7c 44%, #040015 71%);
        box-shadow:
          inset 0 -18px 22px rgba(0, 0, 0, 0.82),
          inset 0 10px 16px rgba(109, 180, 255, 0.4),
          0 0 28px rgba(34, 93, 255, 0.76);
        opacity: 0.92;
      }

      .map-line {
        position: absolute;
        top: 46px;
        left: -7%;
        width: 114%;
        height: 72px;
        opacity: 0.42;
        background:
          linear-gradient(18deg, transparent 12%, rgba(65, 97, 255, 0.42) 13% 14%, transparent 15% 27%, rgba(144, 81, 255, 0.34) 28% 29%, transparent 30%),
          linear-gradient(-13deg, transparent 18%, rgba(255, 68, 226, 0.3) 19% 20%, transparent 21% 55%, rgba(61, 107, 255, 0.4) 56% 57%, transparent 58%);
      }

      .slogan {
        position: absolute;
        top: 184px;
        left: 45px;
        right: 45px;
        text-align: center;
        pointer-events: none;
      }

      .main-title {
        margin: 0;
        font-family: Impact, "Arial Black", "PingFang SC", sans-serif;
        font-size: clamp(34px, 11.2vw, 52px);
        line-height: 0.9;
        letter-spacing: 2px;
        color: transparent;
        -webkit-text-stroke: 1px rgba(255, 255, 255, 0.92);
        background: linear-gradient(180deg, #fff 0%, #a792ff 35%, #f553ff 62%, #4a1768 100%);
        -webkit-background-clip: text;
        background-clip: text;
        filter: drop-shadow(0 4px 0 #321357) drop-shadow(0 0 12px rgba(255, 77, 235, 0.9));
      }

      .sub-title {
        margin: 6px 0 0;
        font-family: Impact, "Arial Black", "PingFang SC", sans-serif;
        font-size: clamp(21px, 6.9vw, 32px);
        line-height: 0.95;
        color: #f1e9ff;
        letter-spacing: 2px;
        text-shadow:
          0 2px 0 #4a1a7d,
          0 0 10px rgba(75, 106, 255, 0.9),
          0 0 18px rgba(255, 59, 225, 0.7);
      }

      .weapon {
        margin: 2px 0 0;
        display: block;
        font-family: Impact, "Arial Black", "PingFang SC", sans-serif;
        font-size: clamp(48px, 15.4vw, 72px);
        line-height: 0.8;
        letter-spacing: 4px;
        color: #fff;
        transform: skew(-8deg) rotate(-2deg);
        -webkit-text-stroke: 1px rgba(85, 22, 117, 0.95);
        text-shadow:
          4px 5px 0 #32124d,
          -2px -2px 0 #ff91ec,
          0 0 9px #fff,
          0 0 24px rgba(255, 42, 226, 0.85),
          0 0 38px rgba(28, 94, 255, 0.75);
      }

      .slogan::before,
      .slogan::after {
        content: "";
        position: absolute;
        top: 48px;
        width: 46%;
        height: 54px;
        background:
          linear-gradient(24deg, transparent 0 48%, #5327ff 49% 51%, transparent 52%),
          linear-gradient(-18deg, transparent 0 45%, #ff3de5 46% 48%, transparent 49%);
        filter: drop-shadow(0 0 8px #8537ff);
        opacity: 0.9;
      }

      .lightning {
        position: absolute;
        left: 26px;
        right: 26px;
        top: 220px;
        height: 126px;
        z-index: 0;
        overflow: visible;
        pointer-events: none;
        filter:
          drop-shadow(0 0 4px rgba(255, 255, 255, 0.88))
          drop-shadow(0 0 10px rgba(103, 70, 255, 0.95))
          drop-shadow(0 0 18px rgba(255, 44, 231, 0.75));
      }

      .lightning path {
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .bolt-pink {
        stroke: #ff4ee7;
        stroke-width: 2.4;
      }

      .bolt-blue {
        stroke: #356dff;
        stroke-width: 2.2;
      }

      .bolt-white {
        stroke: rgba(255, 255, 255, 0.9);
        stroke-width: 1.2;
        opacity: 0.74;
      }

      .slogan::before {
        left: -26px;
      }

      .slogan::after {
        right: -26px;
        transform: scaleX(-1);
      }

      .catalog {
        position: absolute;
        left: 38px;
        right: 38px;
        top: 318px;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 9px 10px;
      }

      .product-card {
        position: relative;
        display: grid;
        grid-template-rows: 1fr 27px;
        align-items: end;
        justify-items: center;
        min-width: 0;
        height: clamp(116px, 31vw, 139px);
        padding: 9px 6px 8px;
        border: 0;
        color: #f6f1ff;
        background:
          linear-gradient(#07040a, #07040a) padding-box,
          linear-gradient(135deg, var(--card-a), #fff 17%, transparent 18% 27%, var(--card-b) 34%, rgba(255,255,255,.8) 48%, transparent 49% 61%, var(--card-a) 72%, #fff 84%, var(--card-b)) border-box;
        border: 2px solid transparent;
        border-radius: 9px;
        cursor: pointer;
        box-shadow:
          inset 0 0 24px rgba(0, 0, 0, 0.95),
          inset 0 0 8px color-mix(in srgb, var(--card-a), transparent 42%),
          0 0 9px color-mix(in srgb, var(--card-a), transparent 15%),
          0 0 18px color-mix(in srgb, var(--card-b), transparent 35%);
        appearance: none;
      }

      .product-card::before,
      .product-card::after {
        content: "";
        position: absolute;
        inset: 7px;
        border-radius: 5px;
        pointer-events: none;
      }

      .product-card::before {
        border: 1px solid rgba(255, 255, 255, 0.58);
        clip-path: polygon(0 13%, 13% 0, 87% 0, 100% 13%, 100% 87%, 87% 100%, 13% 100%, 0 87%);
        box-shadow:
          0 0 8px var(--card-a),
          inset 0 0 9px var(--card-b);
      }

      .product-card::after {
        inset: 0;
        background:
          linear-gradient(90deg, transparent 0 10%, var(--card-a) 11% 15%, transparent 16% 85%, var(--card-b) 86% 90%, transparent 91%),
          linear-gradient(0deg, transparent 0 9%, rgba(255,255,255,.7) 10% 11%, transparent 12% 88%, rgba(255,255,255,.7) 89% 90%, transparent 91%);
        opacity: 0.48;
        mix-blend-mode: screen;
      }

      .product-card:focus-visible {
        outline: 2px solid #fff;
        outline-offset: 3px;
      }

      .product-card.is-active {
        transform: translateY(-2px);
        box-shadow:
          inset 0 0 24px rgba(0, 0, 0, 0.95),
          0 0 13px #fff,
          0 0 26px var(--card-a),
          0 0 38px var(--card-b);
      }

      .product-card.pink {
        --card-a: #ff58dc;
        --card-b: #ffb7ef;
      }

      .product-card.blue {
        --card-a: #17afff;
        --card-b: #c080ff;
      }

      .product-card.purple {
        --card-a: #b85cff;
        --card-b: #ff71ea;
      }

      .product-card.gold {
        --card-a: #ffb53f;
        --card-b: #ffe59a;
      }

      .art {
        width: 92%;
        height: 76px;
        align-self: center;
        filter:
          drop-shadow(0 0 5px var(--card-a))
          drop-shadow(0 0 12px color-mix(in srgb, var(--card-b), transparent 18%));
      }

      .label {
        position: relative;
        z-index: 1;
        display: block;
        width: 100%;
        color: rgba(238, 233, 244, 0.92);
        font-size: clamp(12px, 3.4vw, 15px);
        line-height: 1.15;
        letter-spacing: 0;
        text-align: center;
        text-shadow: 0 0 4px rgba(255, 255, 255, 0.5), 0 0 8px var(--card-a);
        white-space: nowrap;
      }

      .product-card[data-item="bodysuit"] .label,
      .product-card[data-item="roleplay"] .label,
      .product-card[data-item="heels"] .label {
        font-size: clamp(11px, 3.1vw, 15px);
      }

      .art .stroke {
        fill: none;
        stroke: rgba(255, 255, 255, 0.88);
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .art .shine {
        fill: none;
        stroke: rgba(255, 255, 255, 0.92);
        stroke-width: 1.2;
        stroke-linecap: round;
      }

      .art .mesh {
        opacity: 0.55;
        stroke: rgba(255, 255, 255, 0.5);
        stroke-width: 0.8;
      }

      @media (max-width: 360px) {
        .offers {
          width: 81%;
          margin-top: 28px;
        }

        .offer {
          grid-template-columns: 36px 1fr;
          min-height: 45px;
        }

        .number {
          width: 30px;
          height: 30px;
        }

        .slogan {
          top: 212px;
          left: 38px;
          right: 38px;
        }

        .catalog {
          top: 376px;
          left: 28px;
          right: 28px;
          gap: 10px 8px;
        }

        .product-card {
          height: 105px;
          padding: 8px 5px 7px;
          grid-template-rows: 1fr 27px;
        }

        .art {
          height: 66px;
        }
      }

      @media (min-height: 900px) and (max-width: 430px) {
        .catalog {
          top: 416px;
          gap: 14px 11px;
        }

        .product-card {
          height: clamp(122px, 31.2vw, 141px);
        }
      }
    </style>
  </head>
  <body>
    <main class="poster" aria-label="华语商品分类">
      <div class="starfield" aria-hidden="true"></div>
      <div class="energy" aria-hidden="true">
        <span style="--top: 26%; --angle: -17deg; --color: #244bff; --alpha: .72"></span>
        <span style="--top: 31%; --angle: 20deg; --color: #ff43df; --alpha: .65"></span>
        <span style="--top: 36%; --angle: -28deg; --color: #4a86ff; --alpha: .56"></span>
        <span style="--top: 40%; --angle: 13deg; --color: #b33dff; --alpha: .6"></span>
      </div>

      <section class="offers" aria-label="华语价格政策">
        <div class="offer">
          <span class="number">1</span>
          <span>私域客户满<span class="hot">99</span>包邮</span>
        </div>
        <div class="offer">
          <span class="number">2</span>
          <span>电商<span class="cyan">八折</span>一件代发，邮费自理</span>
        </div>
        <div class="offer">
          <span class="number">3</span>
          <span>代理商合作，<span class="purple">7折</span>进货，邮费自理</span>
        </div>
      </section>

      <div class="world" aria-hidden="true">
        <span class="map-line"></span>
      </div>

      <svg class="lightning" viewBox="0 0 360 140" aria-hidden="true">
        <path class="bolt-blue" d="M5 92 L62 64 L49 86 L116 52 L101 81 L169 43 L151 75 L218 46 L203 71 L289 31 L260 66 L355 22"/>
        <path class="bolt-pink" d="M0 118 L70 86 L58 111 L139 70 L121 99 L185 68 L172 94 L247 56 L229 85 L359 40"/>
        <path class="bolt-white" d="M23 72 L91 50 L82 67 L147 38 L137 58 L205 31 L193 52 L274 21"/>
        <path class="bolt-blue" d="M354 104 L292 78 L305 100 L230 61 L247 91 L179 55 L196 81 L112 42 L130 73 L9 35"/>
        <path class="bolt-pink" d="M338 121 L274 91 L286 115 L219 80 L232 108 L167 72 L178 101 L96 65 L114 91 L8 52"/>
        <path class="bolt-white" d="M332 70 L268 48 L280 66 L212 39 L224 57 L154 31 L168 50 L83 22"/>
      </svg>

      <section class="slogan" aria-label="品质与价格">
        <h1 class="main-title">品质与价格</h1>
        <p class="sub-title">是我们公开的</p>
        <strong class="weapon">武器</strong>
      </section>

      <section class="catalog" aria-label="华语商品入口">
        <button class="product-card pink" type="button" data-item="panty" aria-pressed="false">
          <svg class="art" viewBox="0 0 120 92" aria-hidden="true">
            <defs>
              <linearGradient id="pantyGrad" x1="0" x2="1">
                <stop offset="0" stop-color="#250015"/>
                <stop offset=".34" stop-color="#ff53d5"/>
                <stop offset=".68" stop-color="#9b0f71"/>
                <stop offset="1" stop-color="#ffd6f4"/>
              </linearGradient>
            </defs>
            <path d="M17 28 C31 36 47 39 60 39 C73 39 88 35 103 28 C98 51 86 68 67 78 C63 68 57 68 53 78 C34 68 21 51 17 28Z" fill="url(#pantyGrad)"/>
            <path class="stroke" d="M17 28 C31 36 47 39 60 39 C73 39 88 35 103 28 C98 51 86 68 67 78 C63 68 57 68 53 78 C34 68 21 51 17 28Z"/>
            <path class="shine" d="M26 37 C38 43 50 45 60 45 M78 41 C85 39 91 36 97 33"/>
            <path class="mesh" d="M30 42 l24 27 M43 45 l14 23 M77 43 l-20 28 M90 37 l-26 35"/>
          </svg>
          <span class="label">内裤</span>
        </button>

        <button class="product-card pink" type="button" data-item="bra" aria-pressed="false">
          <svg class="art" viewBox="0 0 120 92" aria-hidden="true">
            <defs>
              <radialGradient id="braGrad" cx="50%" cy="40%" r="60%">
                <stop offset="0" stop-color="#ffd2f5"/>
                <stop offset=".42" stop-color="#ff42cf"/>
                <stop offset="1" stop-color="#260017"/>
              </radialGradient>
            </defs>
            <path d="M18 62 C19 36 34 24 51 35 C57 40 59 50 60 66 C49 69 34 67 18 62Z" fill="url(#braGrad)"/>
            <path d="M102 62 C101 36 86 24 69 35 C63 40 61 50 60 66 C71 69 86 67 102 62Z" fill="url(#braGrad)"/>
            <path class="stroke" d="M18 62 C19 36 34 24 51 35 C57 40 59 50 60 66 C49 69 34 67 18 62Z M102 62 C101 36 86 24 69 35 C63 40 61 50 60 66 C71 69 86 67 102 62Z"/>
            <path class="stroke" d="M24 29 C32 10 48 9 56 35 M96 29 C88 10 72 9 64 35 M57 51 C59 48 61 48 63 51"/>
            <path class="shine" d="M34 43 C40 37 47 37 52 44 M68 44 C75 37 83 38 88 45"/>
          </svg>
          <span class="label">胸罩</span>
        </button>

        <button class="product-card blue" type="button" data-item="top" aria-pressed="false">
          <svg class="art" viewBox="0 0 120 92" aria-hidden="true">
            <defs>
              <linearGradient id="topGrad" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0" stop-color="#1d25ff"/>
                <stop offset=".42" stop-color="#7b27ff"/>
                <stop offset=".65" stop-color="#0b0426"/>
                <stop offset="1" stop-color="#57dfff"/>
              </linearGradient>
            </defs>
            <path d="M34 21 C41 31 49 35 60 35 C71 35 79 31 86 21 C96 35 101 51 101 73 C75 79 45 79 19 73 C19 51 24 35 34 21Z" fill="url(#topGrad)"/>
            <path class="stroke" d="M34 21 C41 31 49 35 60 35 C71 35 79 31 86 21 C96 35 101 51 101 73 C75 79 45 79 19 73 C19 51 24 35 34 21Z"/>
            <path class="shine" d="M40 31 C50 39 70 39 80 31 M61 39 V70 M28 67 C47 73 73 73 92 67"/>
            <circle cx="60" cy="50" r="2" fill="#fff"/>
          </svg>
          <span class="label">上衣</span>
        </button>

        <button class="product-card blue" type="button" data-item="skirt" aria-pressed="false">
          <svg class="art" viewBox="0 0 120 92" aria-hidden="true">
            <defs>
              <linearGradient id="skirtGrad" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0" stop-color="#12c5ff"/>
                <stop offset=".36" stop-color="#0922ff"/>
                <stop offset=".72" stop-color="#0a0124"/>
                <stop offset="1" stop-color="#eecbff"/>
              </linearGradient>
            </defs>
            <path d="M36 20 H84 L101 78 C74 87 47 87 20 78Z" fill="url(#skirtGrad)"/>

    <script>
      const cards = document.querySelectorAll(".product-card");
      cards.forEach((card) => {
        card.addEventListener("click", () => {
          cards.forEach((item) => {
            item.classList.remove("is-active");
            item.setAttribute("aria-pressed", "false");
          });
          card.classList.add("is-active");
          card.setAttribute("aria-pressed", "true");
          history.replaceState(null, "", `#${card.dataset.item}`);
        });
      });
