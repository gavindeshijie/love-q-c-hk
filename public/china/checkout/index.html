<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>结算中心 | Secret Language Trade</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #000;
        overscroll-behavior: none;
      }

      body {
        height: 100svh;
        display: grid;
        place-items: center;
        color: #fff;
        -webkit-overflow-scrolling: auto;
      }

      @supports (height: 100dvh) {
        body {
          height: 100dvh;
        }
      }

      a,
      button {
        -webkit-tap-highlight-color: transparent;
      }

      .checkout-page {
        container-type: inline-size;
        position: relative;
        width: min(100vw, calc(100svh * 720 / 1280));
        height: min(100svh, calc(100vw * 1280 / 720));
        max-width: 720px;
        max-height: 1280px;
        overflow: hidden;
        background: #000;
        isolation: isolate;
      }

      @supports (height: 100dvh) {
        .checkout-page {
          width: min(100vw, calc(100dvh * 720 / 1280));
          height: min(100dvh, calc(100vw * 1280 / 720));
        }
      }

      .checkout-page.is-success {
        width: min(100vw, calc(100svh * 590 / 1280));
        height: min(100svh, calc(100vw * 1280 / 590));
        max-width: 590px;
      }

      @supports (height: 100dvh) {
        .checkout-page.is-success {
          width: min(100vw, calc(100dvh * 590 / 1280));
          height: min(100dvh, calc(100vw * 1280 / 590));
        }
      }

      .visual-state {
        position: absolute;
        inset: 0;
        display: none;
      }

      .checkout-page:not(.is-success) .visual-state.checkout-state,
      .checkout-page.is-success .visual-state.success-state {
        display: block;
      }

      .visual-image {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        object-fit: fill;
        user-select: none;
        -webkit-user-drag: none;
      }

      .hit {
        position: absolute;
        z-index: 2;
        display: block;
        border: 0;
        padding: 0;
        color: transparent;
        background: transparent;
        text-decoration: none;
        cursor: pointer;
      }

      .hit:focus-visible {
        outline: 2px solid rgba(255, 255, 255, 0.95);
        outline-offset: 2px;
        border-radius: 8px;
        box-shadow: 0 0 18px rgba(220, 66, 255, 0.9);
      }

      .settle-hit {
        left: 19.8%;
        top: 17.2%;
        width: 60.4%;
        height: 33.2%;
      }

      .pay-hit {
        width: 27.4%;
        height: 5.8%;
      }

      .pay-row-1 { top: 58.1%; }
      .pay-row-2 { top: 65.2%; }
      .pay-row-3 { top: 72.2%; }
      .pay-col-1 { left: 7.6%; }
      .pay-col-2 { left: 36.2%; }
      .pay-col-3 { left: 64.8%; }

      .market-hit {
        top: 87.6%;
        width: 27.2%;
        height: 7.2%;
      }

      .market-1 { left: 8.1%; }
      .market-2 { left: 36.4%; }
      .market-3 { left: 64.8%; }

      .nav-hit {
        top: 93.3%;
        width: 19.6%;
        height: 6.6%;
      }

      .nav-1 { left: 0.4%; }
      .nav-2 { left: 20.2%; }
      .nav-3 { left: 40.2%; }
      .nav-4 { left: 60.2%; }
      .nav-5 { left: 80.0%; }

      .success-exit-hit {
        left: 34.8%;
        top: 83.6%;
        width: 30.4%;
        height: 14.2%;
      }

      .success-safe-exit {
        position: absolute;
        z-index: 4;
        left: 50%;
        bottom: max(7.8%, calc(env(safe-area-inset-bottom) + 86px));
        width: min(48%, 230px);
        min-height: 11.2%;
        transform: translateX(-50%);
        display: grid;
        grid-template-columns: auto 1fr;
        grid-template-rows: auto auto;
        column-gap: 10px;
        align-items: center;
        padding: 10px 13px 9px;
        color: #f4d8ff;
        text-decoration: none;
        border: 1px solid rgba(246, 92, 255, 0.76);
        background:
          linear-gradient(145deg, rgba(20, 0, 34, 0.84), rgba(5, 0, 12, 0.78)),
          radial-gradient(circle at 50% 0%, rgba(180, 55, 255, 0.35), transparent 62%);
        clip-path: polygon(12% 0, 88% 0, 100% 18%, 100% 82%, 88% 100%, 12% 100%, 0 82%, 0 18%);
        box-shadow:
          0 0 16px rgba(211, 48, 255, 0.74),
          inset 0 0 18px rgba(117, 33, 255, 0.48);
      }

      .success-safe-exit::before,
      .success-safe-exit::after {
        content: "";
        position: absolute;
        inset: 5px;
        pointer-events: none;
        clip-path: inherit;
      }

      .success-safe-exit::before {
        border: 1px solid rgba(116, 192, 255, 0.55);
      }

      .success-safe-exit::after {
        inset: 9px 18px auto;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(255, 72, 255, 0.92), transparent);
        box-shadow: 0 0 12px rgba(255, 72, 255, 0.86);
      }

      .success-safe-exit svg {
        grid-row: 1 / 3;
        width: clamp(31px, 7.6cqw, 45px);
        height: clamp(31px, 7.6cqw, 45px);
        filter: drop-shadow(0 0 9px rgba(255, 55, 255, 0.9));
      }

      .success-safe-exit .exit-label {
        font-size: clamp(18px, 4.4cqw, 26px);
        font-weight: 800;
        letter-spacing: 0;
        line-height: 1.05;
        text-shadow: 0 0 10px rgba(243, 80, 255, 0.92);
      }

      .success-safe-exit .countdown-label {
        margin-top: 4px;
        color: rgba(246, 207, 255, 0.92);
        font-size: clamp(10px, 2.45cqw, 14px);
        line-height: 1.25;
        white-space: nowrap;
      }

      .success-safe-exit .countdown-label strong {
        color: #fff;
        font-size: 1.26em;
        padding: 0 2px;
        text-shadow: 0 0 9px rgba(255, 255, 255, 0.95);
      }
    </style>
  </head>
  <body>
    <main class="checkout-page" id="page" aria-label="结算中心">
      <section class="visual-state checkout-state" aria-label="结算中心主页">
        <img class="visual-image" src="../../assets/checkout-visuals/checkout-center.jpg?v=checkout-success-countdown-v1-20260629" alt="结算中心">

        <button class="hit settle-hit" id="settleButton" type="button" aria-label="结账">结账</button>

        <a class="hit pay-hit pay-row-1 pay-col-1" href="#wechat" aria-label="微信"></a>
        <a class="hit pay-hit pay-row-1 pay-col-2" href="#alipay" aria-label="支付宝"></a>
        <a class="hit pay-hit pay-row-1 pay-col-3" href="#china-bank" aria-label="中国银行"></a>
        <a class="hit pay-hit pay-row-2 pay-col-1" href="#singapore-bank" aria-label="新加坡银行"></a>
        <a class="hit pay-hit pay-row-2 pay-col-2" href="#thai-bank" aria-label="泰国银行"></a>
        <a class="hit pay-hit pay-row-2 pay-col-3" href="#hongkong-bank" aria-label="香港银行"></a>
        <a class="hit pay-hit pay-row-3 pay-col-1" href="#malaysia-bank" aria-label="马来西亚银行"></a>
        <a class="hit pay-hit pay-row-3 pay-col-2" href="#cash-on-delivery" aria-label="货到付款"></a>
        <a class="hit pay-hit pay-row-3 pay-col-3" href="#deposit" aria-label="预交30%定金"></a>

        <a class="hit market-hit market-1" href="#tiktok" aria-label="TikTok 官方零售店"></a>
        <a class="hit market-hit market-2" href="#shopee" aria-label="Shopee 官方零售店"></a>
        <a class="hit market-hit market-3" href="#lazada" aria-label="Lazada 官方零售店"></a>

        <a class="hit nav-hit nav-1" href="../cart/?v=checkout-success-countdown-v1-20260629" aria-label="退出结算中心"></a>
        <a class="hit nav-hit nav-2" href="../member/?view=profile&v=checkout-success-countdown-v1-20260629" aria-label="会员中心"></a>
        <a class="hit nav-hit nav-3" href="../support/?v=checkout-success-countdown-v1-20260629" aria-label="客服"></a>
        <a class="hit nav-hit nav-4" href="../cart/?v=checkout-success-countdown-v1-20260629" aria-label="购物车"></a>
        <a class="hit nav-hit nav-5" href="../cart/?v=checkout-success-countdown-v1-20260629" aria-label="返回上一页"></a>
      </section>

      <section class="visual-state success-state" aria-label="结算成功">
        <img class="visual-image" src="../../assets/checkout-visuals/checkout-success.jpg?v=checkout-success-countdown-v1-20260629" alt="结算成功">
        <a class="hit success-exit-hit" href="../member/?view=profile&source=checkout-success&v=checkout-success-countdown-v1-20260629" aria-label="退出"></a>
        <a class="success-safe-exit" id="successExit" href="../member/?view=profile&source=checkout-success&v=checkout-success-countdown-v1-20260629" aria-label="退出并进入会员信息页面">
          <svg viewBox="0 0 64 64" aria-hidden="true">
            <path d="M25 15H13v34h12" fill="none" stroke="currentColor" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M29 32h24" fill="none" stroke="currentColor" stroke-width="4.2" stroke-linecap="round"/>
            <path d="M43 21l11 11-11 11" fill="none" stroke="currentColor" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="exit-label">退出</span>
          <span class="countdown-label"><strong id="successCountdown">3</strong>秒后进入会员信息</span>
        </a>
      </section>
    </main>

    <script>
      const VERSION = "checkout-success-countdown-v1-20260629";
      const page = document.getElementById("page");
      const settleButton = document.getElementById("settleButton");
      const successCountdown = document.getElementById("successCountdown");
      const successTarget = `../member/?view=profile&source=checkout-success&v=${VERSION}`;
      let successCountdownTimer = 0;
      let successRedirectTimer = 0;

      function syncRoute() {
        const current = new URL(window.location.href);
        if (current.searchParams.get("v") !== VERSION) {
          current.searchParams.set("v", VERSION);
          window.history.replaceState(null, "", current);
        }
      }

      function renderState() {
        const current = new URLSearchParams(window.location.search);
        const isSuccess = current.get("success") === "1";
        page.classList.toggle("is-success", isSuccess);
        if (isSuccess) {
          startSuccessCountdown();
        } else {
          stopSuccessCountdown();
        }
      }

      function stopSuccessCountdown() {
        window.clearInterval(successCountdownTimer);
        window.clearTimeout(successRedirectTimer);
        successCountdownTimer = 0;
        successRedirectTimer = 0;
        if (successCountdown) {
          successCountdown.textContent = "3";
        }
      }

      function startSuccessCountdown() {
        stopSuccessCountdown();
        let remaining = 3;
        successCountdown.textContent = String(remaining);
        successCountdownTimer = window.setInterval(() => {
          remaining -= 1;
          if (remaining > 0) {
            successCountdown.textContent = String(remaining);
          }
        }, 1000);
        successRedirectTimer = window.setTimeout(() => {
          window.location.href = successTarget;
        }, 3000);
      }

      syncRoute();
      renderState();

      settleButton.addEventListener("click", () => {
        const next = new URL(window.location.href);
        next.searchParams.set("v", VERSION);
        next.searchParams.set("success", "1");
        history.pushState(null, "", next);
        renderState();
      });

      window.addEventListener("popstate", renderState);
    </script>
  </body>
</html>
