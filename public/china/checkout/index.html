<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>结算中心 | Secret Language Trade</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #000;
        overscroll-behavior: none;
      }

      body {
        height: 100svh;
        display: grid;
        place-items: center;
        color: #fff;
        -webkit-overflow-scrolling: auto;
      }

      @supports (height: 100dvh) {
        body {
          height: 100dvh;
        }
      }

      a,
      button {
        -webkit-tap-highlight-color: transparent;
      }

      .checkout-page {
        container-type: inline-size;
        position: relative;
        width: min(100vw, calc(100svh * 720 / 1280));
        height: min(100svh, calc(100vw * 1280 / 720));
        max-width: 720px;
        max-height: 1280px;
        overflow: hidden;
        background: #000;
        isolation: isolate;
      }

      @supports (height: 100dvh) {
        .checkout-page {
          width: min(100vw, calc(100dvh * 720 / 1280));
          height: min(100dvh, calc(100vw * 1280 / 720));
        }
      }

      .checkout-page.is-success {
        width: min(100vw, calc(100svh * 590 / 1280));
        height: min(100svh, calc(100vw * 1280 / 590));
        max-width: 590px;
      }

      @supports (height: 100dvh) {
        .checkout-page.is-success {
          width: min(100vw, calc(100dvh * 590 / 1280));
          height: min(100dvh, calc(100vw * 1280 / 590));
        }
      }

      .visual-state {
        position: absolute;
        inset: 0;
        display: none;
      }

      .checkout-page:not(.is-success) .visual-state.checkout-state,
      .checkout-page.is-success .visual-state.success-state {
        display: block;
      }

      .visual-image {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        object-fit: fill;
        user-select: none;
        -webkit-user-drag: none;
      }

      .hit {
        position: absolute;
        z-index: 2;
        display: block;
        border: 0;
        padding: 0;
        color: transparent;
        background: transparent;
        text-decoration: none;
        cursor: pointer;
      }

      .hit:focus-visible {
        outline: 2px solid rgba(255, 255, 255, 0.95);
        outline-offset: 2px;
        border-radius: 8px;
        box-shadow: 0 0 18px rgba(220, 66, 255, 0.9);
      }

      .settle-hit {
        left: 19.8%;
        top: 17.2%;
        width: 60.4%;
        height: 33.2%;
      }

      .pay-hit {
        width: 27.4%;
        height: 5.8%;
      }

      .pay-row-1 { top: 58.1%; }
      .pay-row-2 { top: 65.2%; }
      .pay-row-3 { top: 72.2%; }
      .pay-col-1 { left: 7.6%; }
      .pay-col-2 { left: 36.2%; }
      .pay-col-3 { left: 64.8%; }

      .market-hit {
        top: 87.6%;
        width: 27.2%;
        height: 7.2%;
      }

      .market-1 { left: 8.1%; }
      .market-2 { left: 36.4%; }
      .market-3 { left: 64.8%; }

      .nav-hit {
        top: 93.3%;
        width: 19.6%;
        height: 6.6%;
      }

      .nav-1 { left: 0.4%; }
      .nav-2 { left: 20.2%; }
      .nav-3 { left: 40.2%; }
      .nav-4 { left: 60.2%; }
      .nav-5 { left: 80.0%; }

      .success-exit-hit {
        left: 34.8%;
        top: 83.6%;
        width: 30.4%;
        height: 14.2%;
      }
    </style>
  </head>
  <body>
    <main class="checkout-page" id="page" aria-label="结算中心">
      <section class="visual-state checkout-state" aria-label="结算中心主页">
        <img class="visual-image" src="../../assets/checkout-visuals/checkout-center.jpg?v=checkout-visual-v1-20260629" alt="结算中心">

        <button class="hit settle-hit" id="settleButton" type="button" aria-label="结账">结账</button>

        <a class="hit pay-hit pay-row-1 pay-col-1" href="#wechat" aria-label="微信"></a>
        <a class="hit pay-hit pay-row-1 pay-col-2" href="#alipay" aria-label="支付宝"></a>
        <a class="hit pay-hit pay-row-1 pay-col-3" href="#china-bank" aria-label="中国银行"></a>
        <a class="hit pay-hit pay-row-2 pay-col-1" href="#singapore-bank" aria-label="新加坡银行"></a>
        <a class="hit pay-hit pay-row-2 pay-col-2" href="#thai-bank" aria-label="泰国银行"></a>
        <a class="hit pay-hit pay-row-2 pay-col-3" href="#hongkong-bank" aria-label="香港银行"></a>
        <a class="hit pay-hit pay-row-3 pay-col-1" href="#malaysia-bank" aria-label="马来西亚银行"></a>
        <a class="hit pay-hit pay-row-3 pay-col-2" href="#cash-on-delivery" aria-label="货到付款"></a>
        <a class="hit pay-hit pay-row-3 pay-col-3" href="#deposit" aria-label="预交30%定金"></a>

        <a class="hit market-hit market-1" href="#tiktok" aria-label="TikTok 官方零售店"></a>
        <a class="hit market-hit market-2" href="#shopee" aria-label="Shopee 官方零售店"></a>
        <a class="hit market-hit market-3" href="#lazada" aria-label="Lazada 官方零售店"></a>

        <a class="hit nav-hit nav-1" href="../cart/?v=checkout-visual-v1-20260629" aria-label="退出结算中心"></a>
        <a class="hit nav-hit nav-2" href="../member/?view=profile&v=checkout-visual-v1-20260629" aria-label="会员中心"></a>
        <a class="hit nav-hit nav-3" href="../support/?v=checkout-visual-v1-20260629" aria-label="客服"></a>
        <a class="hit nav-hit nav-4" href="../cart/?v=checkout-visual-v1-20260629" aria-label="购物车"></a>
        <a class="hit nav-hit nav-5" href="../cart/?v=checkout-visual-v1-20260629" aria-label="返回上一页"></a>
      </section>

      <section class="visual-state success-state" aria-label="结算成功">
        <img class="visual-image" src="../../assets/checkout-visuals/checkout-success.jpg?v=checkout-visual-v1-20260629" alt="结算成功">
        <a class="hit success-exit-hit" href="../cart/?v=checkout-visual-v1-20260629" aria-label="退出"></a>
      </section>
    </main>

    <script>
      const VERSION = "checkout-visual-v1-20260629";
      const page = document.getElementById("page");
      const settleButton = document.getElementById("settleButton");

      function syncRoute() {
        const current = new URL(window.location.href);
        if (current.searchParams.get("v") !== VERSION) {
          current.searchParams.set("v", VERSION);
          window.history.replaceState(null, "", current);
        }
      }

      function renderState() {
        const current = new URLSearchParams(window.location.search);
        page.classList.toggle("is-success", current.get("success") === "1");
      }

      syncRoute();
      renderState();

      settleButton.addEventListener("click", () => {
        const next = new URL(window.location.href);
        next.searchParams.set("v", VERSION);
        next.searchParams.set("success", "1");
        history.pushState(null, "", next);
        renderState();
      });

      window.addEventListener("popstate", renderState);
    </script>
  </body>
</html>
