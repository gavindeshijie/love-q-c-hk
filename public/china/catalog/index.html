<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>华语商品列表 | Secret Language Trade</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        min-height: 100%;
        background: #000;
      }

      body {
        overflow: hidden;
        -webkit-text-size-adjust: 100%;
      }

      .screen {
        position: relative;
        width: 100vw;
        height: 100svh;
        min-height: 100vh;
        overflow: hidden;
        background: #000;
      }

      @supports (height: 100dvh) {
        .screen {
          height: 100dvh;
        }
      }

      .shot {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: fill;
        object-position: top center;
        user-select: none;
        -webkit-user-drag: none;
      }

      .hotspot {
        position: fixed;
        bottom: 0;
        height: max(72px, 9.5svh);
        border: 0;
        background: transparent;
        color: transparent;
        -webkit-tap-highlight-color: transparent;
      }

      .back-hotspot {
        left: 0;
        width: 26%;
      }

      .member-hotspot {
        left: 26%;
        width: 24%;
      }

      .service-hotspot {
        left: 50%;
        width: 24%;
      }

      .cart-hotspot {
        left: 74%;
        width: 26%;
      }
    </style>
  </head>
  <body>
    <main class="screen" aria-label="商品列表">
      <img class="shot" id="catalogImage" src="../../assets/china-product-pages/panty.jpg?v=product-pages-2596e92" alt="商品列表">
      <a class="hotspot back-hotspot" href="../" aria-label="返回上一页">返回上一页</a>
      <a class="hotspot member-hotspot" href="#member" aria-label="会员登录">会员登录</a>
      <a class="hotspot service-hotspot" href="#service" aria-label="客服">客服</a>
      <a class="hotspot cart-hotspot" href="#cart" aria-label="购物车">购物车</a>
    </main>

    <script>
      const pages = {
        panty: { title: "内裤", image: "panty.jpg" },
        bra: { title: "胸罩", image: "bra.jpg" },
        top: { title: "上衣", image: "top.jpg" },
        skirt: { title: "裙子 / 短裤", image: "skirt.jpg" },
        dress: { title: "连衣裙", image: "dress.jpg" },
        stockings: { title: "袜子", image: "stockings.jpg" },
        bodysuit: { title: "贴身连体衣", image: "bodysuit.jpg" },
        roleplay: { title: "角色扮演制服", image: "roleplay.jpg" },
        pants: { title: "长裤", image: "pants.jpg" },
        hat: { title: "帽子", image: "hat.jpg" },
        heels: { title: "女士凉鞋", image: "heels.jpg" },
        bag: { title: "女士包包", image: "bag.jpg" }
      };

      const params = new URLSearchParams(window.location.search);
      const category = params.get("category") || "panty";
      const page = pages[category] || pages.panty;
      const image = document.getElementById("catalogImage");

      document.title = `${page.title} | Secret Language Trade`;
      image.src = `../../assets/china-product-pages/${page.image}?v=product-pages-2596e92`;
      image.alt = page.title;
    </script>
  </body>
</html>
