<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>华语商品列表 | Secret Language Trade</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #030006;
        --line: rgba(220, 236, 255, 0.78);
        --muted: rgba(255, 255, 255, 0.72);
        --purple: #ff38ff;
        --blue: #3214ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        min-height: 100%;
        background: #000;
      }

      body {
        overflow-x: hidden;
        overflow-y: auto;
        color: #fff;
        font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
        letter-spacing: 0;
        -webkit-text-size-adjust: 100%;
      }

      button,
      input {
        font: inherit;
      }

      .catalog {
        position: relative;
        width: 100%;
        max-width: 760px;
        min-height: 100svh;
        margin: 0 auto;
        padding: max(10px, env(safe-area-inset-top)) 14px max(92px, env(safe-area-inset-bottom));
        background:
          radial-gradient(circle at 50% 9%, rgba(255, 42, 255, 0.16), transparent 17%),
          radial-gradient(circle at 18% 47%, rgba(80, 0, 180, 0.18), transparent 25%),
          radial-gradient(circle at 82% 58%, rgba(80, 0, 180, 0.2), transparent 27%),
          #020003;
        overflow: hidden;
      }

      .catalog::before,
      .catalog::after {
        content: "";
        position: absolute;
        top: 2.7rem;
        width: 29%;
        height: 54px;
        opacity: 0.78;
        background:
          linear-gradient(15deg, transparent 18%, rgba(255, 62, 255, 0.72) 19%, transparent 22%),
          linear-gradient(-10deg, transparent 35%, rgba(255, 89, 255, 0.58) 36%, transparent 39%),
          linear-gradient(8deg, transparent 57%, rgba(147, 58, 255, 0.58) 58%, transparent 62%);
        filter: drop-shadow(0 0 8px rgba(255, 42, 255, 0.85));
        pointer-events: none;
      }

      .catalog::before {
        left: 9%;
      }

      .catalog::after {
        right: 9%;
        transform: scaleX(-1);
      }

      .title {
        position: relative;
        z-index: 1;
        margin: 0 auto 0.55rem;
        min-height: 54px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: clamp(38px, 10.5vw, 72px);
        font-weight: 800;
        line-height: 1;
        text-align: center;
        text-shadow:
          0 0 3px #fff,
          0 0 9px #ff5cff,
          0 0 17px #9e22ff,
          0 0 30px rgba(255, 0, 255, 0.74);
      }

      .filters {
        position: relative;
        z-index: 2;
        display: grid;
        gap: 9px 10px;
        margin-bottom: 12px;
      }

      .filters.cols-3 {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .filters.cols-4 {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .filters.cols-5 {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }

      .filter-button {
        min-width: 0;
        height: clamp(36px, 6.1vw, 48px);
        border: 1px solid var(--line);
        border-radius: 7px;
        background:
          linear-gradient(90deg, rgba(166, 61, 255, 0.16), transparent 26%, transparent 74%, rgba(61, 232, 255, 0.14)),
          #030303;
        color: rgba(255, 255, 255, 0.92);
        font-size: clamp(15px, 4.3vw, 24px);
        font-weight: 650;
        line-height: 1;
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.13),
          0 0 6px rgba(190, 164, 255, 0.22);
        -webkit-tap-highlight-color: transparent;
      }

      .filter-button.is-active {
        border-color: rgba(255, 125, 255, 1);
        color: #fff;
        background:
          linear-gradient(90deg, rgba(255, 51, 247, 0.34), rgba(76, 0, 118, 0.35)),
          #080008;
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.28),
          0 0 5px #fff,
          0 0 14px rgba(255, 36, 255, 0.95),
          0 0 26px rgba(137, 0, 255, 0.78);
      }

      .search {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 8px;
        height: 58px;
        margin-bottom: 12px;
        padding: 0 12px 0 18px;
        border: 1px solid rgba(222, 232, 255, 0.84);
        border-radius: 999px;
        background: #030303;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      }

      .search-field {
        min-width: 0;
        display: grid;
        grid-template-columns: 33px 1fr;
        align-items: center;
      }

      .search-icon {
        position: relative;
        width: 25px;
        height: 25px;
        border: 2px solid rgba(241, 248, 255, 0.9);
        border-radius: 50%;
      }

      .search-icon::after {
        content: "";
        position: absolute;
        width: 11px;
        height: 2px;
        right: -8px;
        bottom: 0;
        border-radius: 999px;
        background: rgba(241, 248, 255, 0.9);
        transform: rotate(45deg);
        transform-origin: left center;
      }

      .search input {
        min-width: 0;
        border: 0;
        outline: 0;
        background: transparent;
        color: #fff;
        font-size: clamp(17px, 4.5vw, 24px);
      }

      .search input::placeholder {
        color: rgba(255, 255, 255, 0.46);
      }

      .search button {
        min-width: 88px;
        height: 40px;
        border: 0;
        border-radius: 13px;
        background: linear-gradient(135deg, #501dff, #7d08ff 58%, #3d00ce);
        color: #fff;
        font-size: clamp(16px, 4.3vw, 23px);
        box-shadow: 0 0 12px rgba(95, 20, 255, 0.75);
      }

      .products {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .product {
        position: relative;
        min-width: 0;
        aspect-ratio: 1 / 0.94;
        display: grid;
        grid-template-rows: 59% auto;
        padding: 1px;
        border: 1px solid rgba(231, 237, 255, 0.76);
        clip-path: polygon(0 8px, 8px 0, calc(100% - 8px) 0, 100% 8px, 100% calc(100% - 8px), calc(100% - 8px) 100%, 8px 100%, 0 calc(100% - 8px));
        background:
          radial-gradient(circle at 50% 40%, rgba(96, 0, 180, 0.22), transparent 55%),
          #020203;
        color: #fff;
        text-decoration: none;
        overflow: hidden;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        -webkit-tap-highlight-color: transparent;
      }

      .product.is-active {
        border-color: rgba(255, 104, 255, 0.96);
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.2),
          0 0 14px rgba(255, 51, 255, 0.62);
      }

      .product-media {
        position: relative;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 50%, rgba(91, 0, 170, 0.26), transparent 60%),
          #040206;
      }

      .product-media::before {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 0.36;
        background:
          linear-gradient(28deg, transparent 42%, rgba(139, 35, 255, 0.45) 43%, transparent 46%),
          linear-gradient(-28deg, transparent 52%, rgba(50, 0, 150, 0.45) 53%, transparent 57%);
      }

      .product-media img {
        position: relative;
        z-index: 1;
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: center;
      }

      .product-info {
        display: grid;
        align-content: end;
        gap: 5px;
        padding: 6px 10px 8px;
        background: rgba(0, 0, 0, 0.82);
      }

      .product-desc {
        min-width: 0;
        color: rgba(255, 255, 255, 0.78);
        font-size: clamp(13px, 3.7vw, 19px);
        line-height: 1.18;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .product-meta {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 8px;
        color: rgba(255, 255, 255, 0.74);
      }

      .price {
        font-size: clamp(18px, 5vw, 26px);
        font-weight: 500;
      }

      .code {
        font-size: clamp(15px, 4.1vw, 22px);
        letter-spacing: 1px;
        white-space: nowrap;
      }

      .bottom-nav {
        position: fixed;
        left: 50%;
        bottom: 0;
        z-index: 5;
        width: min(100%, 760px);
        transform: translateX(-50%);
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 2px;
        padding: 8px 13px max(8px, env(safe-area-inset-bottom));
        background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.92) 24%, #000);
      }

      .nav-link {
        min-width: 0;
        color: rgba(255, 255, 255, 0.78);
        text-decoration: none;
        text-align: center;
        font-size: 12px;
      }

      .nav-icon {
        width: 40px;
        height: 40px;
        margin: 0 auto 4px;
        display: grid;
        place-items: center;
        border: 1px solid rgba(255, 255, 255, 0.72);
        border-radius: 50%;
        font-size: 26px;
        line-height: 1;
      }

      .catalog.panty-reference {

        max-width: 738px;

        padding: 0 1.85cqw 22cqw;

          radial-gradient(circle at 52% 67cqw, rgba(95, 0, 170, 0.16), transparent 42cqw),

      .catalog.panty-reference::before {

      }

      .catalog.panty-reference::after {
        right: 8.1cqw;
      }

      .panty-reference .title {

        margin: 0 0 0.75cqw;
        padding-top: 1.6cqw;

        line-height: 1;
        letter-spacing: 0;
        text-shadow:

          0 0 1.15cqw #ff43ff,

          0 0 3.4cqw rgba(255, 28, 255, 0.8);
      }

      .panty-reference .filters {
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 1.25cqw 1.55cqw;

      .panty-reference .filter-button {

        clip-path: polygon(0 1.25cqw, 1.25cqw 0, calc(100% - 1.25cqw) 0, 100% 1.25cqw, 100% calc(100% - 1.25cqw), calc(100% - 1.25cqw) 100%, 1.25cqw 100%, 0 calc(100% - 1.25cqw));

        font-size: clamp(14px, 3.25cqw, 24px);

        box-shadow:

      .panty-reference .filter-button.is-active {
        border-color: rgba(255, 111, 255, 0.98);

        box-shadow:
          inset 0 0 0 0.18cqw rgba(255, 255, 255, 0.2),
          0 0 0.8cqw #fff,
          0 0 2cqw rgba(255, 35, 255, 0.98),
          0 0 3.35cqw rgba(128, 0, 255, 0.8);
      }

      .panty-reference .search {

        margin: 0 0 1.9cqw;

      .panty-reference .search-field {

      .panty-reference .search-icon {

      .panty-reference .products {

      .panty-reference .product {
        aspect-ratio: 1 / 1.01;
        grid-template-rows: 72% 28%;

        border: 0.14cqw solid rgba(233, 239, 255, 0.78);

      .panty-reference .product-info {

      .panty-reference .product-desc {

      .panty-reference .price {
        font-size: clamp(17px, 3.72cqw, 27.5px);

      }

      .panty-reference .code {
        font-size: clamp(15px, 3.15cqw, 23.2px);
        letter-spacing: 0.12cqw;
      }

      body[data-category="panty"] .bottom-nav {
        width: min(100%, 738px);
        min-height: 13.4cqw;
        grid-template-columns: repeat(4, 10.2cqw);

        gap: 1.35cqw;
        padding: 1.2cqw 2.2cqw max(0.9cqw, env(safe-area-inset-bottom));

      }

      body[data-category="panty"] .nav-link {

        line-height: 1.1;
      }

      body[data-category="panty"] .nav-icon {
        width: 5.65cqw;
        height: 5.65cqw;
        margin-bottom: 0.75cqw;
        border-width: 0.16cqw;
        font-size: clamp(18px, 4.3cqw, 31.5px);
      }

      @media (max-width: 380px) {
        .catalog {
          padding-left: 10px;
          padding-right: 10px;
        }

        }

        .filter-button {
          font-size: 13px;
        }

        .product-info {
          padding-left: 7px;
          padding-right: 7px;
        }
      }
    </style>
  </head>

      const title = document.getElementById("pageTitle");
      const catalog = document.querySelector(".catalog");
      const filters = document.getElementById("filterLayer");
      const grid = document.getElementById("productGrid");
      const searchForm = document.getElementById("searchForm");
      const searchInput = document.getElementById("searchInput");
      let activeFilter = params.get("filter") || page.active;

      document.title = `${page.title} | Secret Language Trade`;
      title.textContent = page.title;
      catalog.dataset.category = category;
      if (category === "panty") {
        catalog.classList.add("panty-reference");
      }
      filters.className = `filters cols-${page.columns}`;

      function updateFilter(filter) {
        activeFilter = filter;
        filters.querySelectorAll(".filter-button").forEach((button) => {
          const selected = button.dataset.filter === activeFilter;
          button.classList.toggle("is-active", selected);
          button.setAttribute("aria-pressed", selected ? "true" : "false");
        });
        const nextUrl = new URL(window.location.href);
        nextUrl.searchParams.set("category", category);
        nextUrl.searchParams.set("filter", activeFilter);
        history.replaceState(null, "", nextUrl);
      }

      page.filters.forEach((filter) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "filter-button";
        button.textContent = filter;
        button.dataset.filter = filter;
        button.setAttribute("aria-pressed", filter === activeFilter ? "true" : "false");
        if (filter === activeFilter) {
          button.classList.add("is-active");
        }
        button.addEventListener("click", () => updateFilter(filter));
        filters.append(button);
      });

      page.products.forEach((product, index) => {
        const [desc, price, code] = product;
        const item = document.createElement("a");
        item.className = "product";
        item.href = `#${code}`;
        item.innerHTML = `
          <div class="product-media">
            <img src="../../assets/china-product-items/${category}-${index + 1}.jpg?v=editable-catalog-20260628" alt="${desc}">
          </div>
          <div class="product-info">
            <div class="product-desc">${desc}</div>
            <div class="product-meta">
              <span class="price">${price}</span>
              <span class="code">${code}</span>
            </div>
          </div>
        `;
        item.addEventListener("click", () => {
          grid.querySelectorAll(".product").forEach((card) => card.classList.remove("is-active"));
          item.classList.add("is-active");
        });
        grid.append(item);
      });

      searchForm.addEventListener("submit", (event) => {
        event.preventDefault();
        const nextUrl = new URL(window.location.href);
        nextUrl.searchParams.set("category", category);
        if (searchInput.value.trim()) {
          nextUrl.searchParams.set("q", searchInput.value.trim());
        } else {
          nextUrl.searchParams.delete("q");
        }
        history.replaceState(null, "", nextUrl);
      });
