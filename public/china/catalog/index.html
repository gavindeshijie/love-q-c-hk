<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>华语商品列表 | Secret Language Trade</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #030006;
        --line: rgba(220, 236, 255, 0.78);
        --muted: rgba(255, 255, 255, 0.72);
        --purple: #ff38ff;
        --blue: #3214ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        min-height: 100%;
        background: #000;
      }

      body {
        overflow-x: hidden;
        overflow-y: auto;
        color: #fff;
        font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
        letter-spacing: 0;
        -webkit-text-size-adjust: 100%;
      }

      button,
      input {
        font: inherit;
      }

      .catalog {
        position: relative;
        width: 100%;
        max-width: 760px;
        min-height: 100svh;
        margin: 0 auto;
        padding: max(10px, env(safe-area-inset-top)) 14px max(92px, env(safe-area-inset-bottom));
        background:
          radial-gradient(circle at 50% 9%, rgba(255, 42, 255, 0.16), transparent 17%),
          radial-gradient(circle at 18% 47%, rgba(80, 0, 180, 0.18), transparent 25%),
          radial-gradient(circle at 82% 58%, rgba(80, 0, 180, 0.2), transparent 27%),
          #020003;
        overflow: hidden;
      }

      .catalog::before,
      .catalog::after {
        content: "";
        position: absolute;
        top: 2.7rem;
        width: 29%;
        height: 54px;
        opacity: 0.78;
        background:
          linear-gradient(15deg, transparent 18%, rgba(255, 62, 255, 0.72) 19%, transparent 22%),
          linear-gradient(-10deg, transparent 35%, rgba(255, 89, 255, 0.58) 36%, transparent 39%),
          linear-gradient(8deg, transparent 57%, rgba(147, 58, 255, 0.58) 58%, transparent 62%);
        filter: drop-shadow(0 0 8px rgba(255, 42, 255, 0.85));
        pointer-events: none;
      }

      .catalog::before {
        left: 9%;
      }

      .catalog::after {
        right: 9%;
        transform: scaleX(-1);
      }

      .title {
        position: relative;
        z-index: 1;
        margin: 0 auto 0.55rem;
        min-height: 54px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: clamp(38px, 10.5vw, 72px);
        font-weight: 800;
        line-height: 1;
        text-align: center;
        text-shadow:
          0 0 3px #fff,
          0 0 9px #ff5cff,
          0 0 17px #9e22ff,
          0 0 30px rgba(255, 0, 255, 0.74);
      }

      .filters {
        position: relative;
        z-index: 2;
        display: grid;
        gap: 9px 10px;
        margin-bottom: 12px;
      }

      .filters.cols-3 {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .filters.cols-4 {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .filters.cols-5 {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }

      .filter-button {
        min-width: 0;
        height: clamp(36px, 6.1vw, 48px);
        border: 1px solid var(--line);
        border-radius: 7px;
        background:
          linear-gradient(90deg, rgba(166, 61, 255, 0.16), transparent 26%, transparent 74%, rgba(61, 232, 255, 0.14)),
          #030303;
        color: rgba(255, 255, 255, 0.92);
        font-size: clamp(15px, 4.3vw, 24px);
        font-weight: 650;
        line-height: 1;
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.13),
          0 0 6px rgba(190, 164, 255, 0.22);
        -webkit-tap-highlight-color: transparent;
      }

      .filter-button.is-active {
        border-color: rgba(255, 125, 255, 1);
        color: #fff;
        background:
          linear-gradient(90deg, rgba(255, 51, 247, 0.34), rgba(76, 0, 118, 0.35)),
          #080008;
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.28),
          0 0 5px #fff,
          0 0 14px rgba(255, 36, 255, 0.95),
          0 0 26px rgba(137, 0, 255, 0.78);
      }

      .search {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 8px;
        height: 58px;
        margin-bottom: 12px;
        padding: 0 12px 0 18px;
        border: 1px solid rgba(222, 232, 255, 0.84);
        border-radius: 999px;
        background: #030303;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      }

      .search-field {
        min-width: 0;
        display: grid;
        grid-template-columns: 33px 1fr;
        align-items: center;
      }

      .search-icon {
        position: relative;
        width: 25px;
        height: 25px;
        border: 2px solid rgba(241, 248, 255, 0.9);
        border-radius: 50%;
      }

      .search-icon::after {
        content: "";
        position: absolute;
        width: 11px;
        height: 2px;
        right: -8px;
        bottom: 0;
        border-radius: 999px;
        background: rgba(241, 248, 255, 0.9);
        transform: rotate(45deg);
        transform-origin: left center;
      }

      .search input {
        min-width: 0;
        border: 0;
        outline: 0;
        background: transparent;
        color: #fff;
        font-size: clamp(17px, 4.5vw, 24px);
      }

      .search input::placeholder {
        color: rgba(255, 255, 255, 0.46);
      }

      .search button {
        min-width: 88px;
        height: 40px;
        border: 0;
        border-radius: 13px;
        background: linear-gradient(135deg, #501dff, #7d08ff 58%, #3d00ce);
        color: #fff;
        font-size: clamp(16px, 4.3vw, 23px);
        box-shadow: 0 0 12px rgba(95, 20, 255, 0.75);
      }

      .products {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .product {
        position: relative;
        min-width: 0;
        aspect-ratio: 1 / 0.94;
        display: grid;
        grid-template-rows: 59% auto;
        padding: 1px;
        border: 1px solid rgba(231, 237, 255, 0.76);
        clip-path: polygon(0 8px, 8px 0, calc(100% - 8px) 0, 100% 8px, 100% calc(100% - 8px), calc(100% - 8px) 100%, 8px 100%, 0 calc(100% - 8px));
        background:
          radial-gradient(circle at 50% 40%, rgba(96, 0, 180, 0.22), transparent 55%),
          #020203;
        color: #fff;
        text-decoration: none;
        overflow: hidden;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        -webkit-tap-highlight-color: transparent;
      }

      .product.is-active {
        border-color: rgba(255, 104, 255, 0.96);
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.2),
          0 0 14px rgba(255, 51, 255, 0.62);
      }

      .product-media {
        position: relative;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 50%, rgba(91, 0, 170, 0.26), transparent 60%),
          #040206;
      }

      .product-media::before {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 0.36;
        background:
          linear-gradient(28deg, transparent 42%, rgba(139, 35, 255, 0.45) 43%, transparent 46%),
          linear-gradient(-28deg, transparent 52%, rgba(50, 0, 150, 0.45) 53%, transparent 57%);
      }

      .product-media img {
        position: relative;
        z-index: 1;
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: center;
      }

      .product-info {
        display: grid;
        align-content: end;
        gap: 5px;
        padding: 6px 10px 8px;
        background: rgba(0, 0, 0, 0.82);
      }

      .product-desc {
        min-width: 0;
        color: rgba(255, 255, 255, 0.78);
        font-size: clamp(13px, 3.7vw, 19px);
        line-height: 1.18;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .product-meta {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 8px;
        color: rgba(255, 255, 255, 0.74);
      }

      .price {
        font-size: clamp(18px, 5vw, 26px);
        font-weight: 500;
      }

      .code {
        font-size: clamp(15px, 4.1vw, 22px);
        letter-spacing: 1px;
        white-space: nowrap;
      }

      .bottom-nav {
        position: fixed;
        left: 50%;
        bottom: 0;
        z-index: 5;
        width: min(100%, 760px);
        transform: translateX(-50%);
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 2px;
        padding: 8px 13px max(8px, env(safe-area-inset-bottom));
        background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.92) 24%, #000);
      }

      .nav-link {
        min-width: 0;
        color: rgba(255, 255, 255, 0.78);
        text-decoration: none;
        text-align: center;
        font-size: 12px;
      }

      .nav-icon {
        width: 40px;
        height: 40px;
        margin: 0 auto 4px;
        display: grid;
        place-items: center;
        border: 1px solid rgba(255, 255, 255, 0.72);
        border-radius: 50%;
        font-size: 26px;
        line-height: 1;
      }

      .catalog.catalog-reference {
        container-type: inline-size;
        width: 100%;
        max-width: 738px;
        min-height: 173.45cqw;
        padding: 0 1.85cqw 22cqw;
        background:
          radial-gradient(circle at 50% 8.5cqw, rgba(255, 22, 255, 0.15), transparent 15cqw),
          radial-gradient(circle at 52% 67cqw, rgba(95, 0, 170, 0.16), transparent 42cqw),
          #000;
        overflow: visible;
      }

      .catalog.catalog-reference::before,
      .catalog.catalog-reference::after {
        top: 4.4cqw;
        width: 27cqw;
        height: 4.6cqw;
        opacity: 0.85;
        background:
          linear-gradient(8deg, transparent 5%, rgba(224, 60, 255, 0.95) 6%, transparent 10%),
          linear-gradient(-6deg, transparent 27%, rgba(172, 56, 255, 0.86) 28%, transparent 32%),
          linear-gradient(5deg, transparent 48%, rgba(255, 85, 255, 0.7) 49%, transparent 52%),
          linear-gradient(-7deg, transparent 66%, rgba(115, 28, 255, 0.65) 67%, transparent 71%);
        filter: drop-shadow(0 0 0.9cqw rgba(255, 38, 255, 0.85));
      }

      .catalog.catalog-reference::before {
        left: 8.1cqw;
      }

      .catalog.catalog-reference::after {
        right: 8.1cqw;
      }

      .catalog-reference .title {
        min-height: 10.4cqw;
        margin: 0 0 0.75cqw;
        padding-top: 1.6cqw;
        font-size: clamp(38px, 8.75cqw, 66px);
        font-weight: 900;
        line-height: 1;
        letter-spacing: 0;
        text-shadow:
          0 0 0.35cqw #fff,
          0 0 1.15cqw #ff43ff,
          0 0 2.35cqw #ba35ff,
          0 0 3.4cqw rgba(255, 28, 255, 0.8);
      }

      .catalog-reference .filters {
        gap: 1.48cqw 1.45cqw;
        margin: 0 0 1.45cqw;
      }

      .catalog-reference .filter-button {
        position: relative;
        display: grid;
        place-items: center;
        overflow: visible;
        height: 8.4cqw;
        min-height: 0;
        padding: 0 1.1cqw;
        border: 0;
        border-radius: 0;
        background: transparent;
        color: rgba(255, 255, 255, 0.92);
        font-size: clamp(15px, 3.42cqw, 25.3px);
        font-weight: 700;
        text-shadow: 0 0 0.7cqw rgba(255, 255, 255, 0.45);
        box-shadow: none;
      }

      .catalog-reference .filter-button::before,
      .catalog-reference .filter-button::after {
        content: "";
        position: absolute;
        pointer-events: none;
      }

      .catalog-reference .filter-button::before {
        inset: 1.25cqw 1.45cqw;
        z-index: 0;
        background: rgba(0, 0, 0, 0.58);
        border-radius: 0.65cqw;
      }

      .catalog-reference .filter-button::after {
        inset: -0.12cqw;
        z-index: 1;
        background: url("../../assets/china-catalog-ui/filter-frame-generated.png?v=frame-generated-20260628") center / 100% 100% no-repeat;
      }

      .catalog-reference .filter-button.is-active {
        color: #fff;
        text-shadow:
          0 0 0.5cqw #fff,
          0 0 1.2cqw rgba(255, 73, 255, 0.95);
      }

      .catalog-reference .filter-button.is-active::before {
        background: rgba(5, 0, 9, 0.62);
      }

      .catalog-reference .filter-button.is-active::after {
        background-image: url("../../assets/china-catalog-ui/filter-frame-active-generated.png?v=frame-generated-20260628");
      }

      .catalog-reference .filter-label {
        position: relative;
        z-index: 2;
      }

      .catalog-reference .search {
        height: 8.8cqw;
        margin: 0 0 1.9cqw;
        padding: 0 1.9cqw 0 2.65cqw;
        border: 0.14cqw solid rgba(222, 231, 248, 0.86);
        border-radius: 999px;
        gap: 1.1cqw;
        background: #020202;
        box-shadow: inset 0 0 0 0.16cqw rgba(255, 255, 255, 0.08);
      }

      .catalog-reference .search-field {
        grid-template-columns: 5.9cqw 1fr;
      }

      .catalog-reference .search-icon {
        width: 3.8cqw;
        height: 3.8cqw;
        border-width: 0.28cqw;
      }

      .catalog-reference .search-icon::after {
        width: 1.75cqw;
        height: 0.28cqw;
        right: -1.25cqw;
        bottom: 0.15cqw;
      }

      .catalog-reference .search input {
        font-size: clamp(15px, 3.05cqw, 22.5px);
      }

      .catalog-reference .search button {
        min-width: 13.8cqw;
        height: 6.05cqw;
        border-radius: 1.65cqw;
        font-size: clamp(15px, 3.05cqw, 22.5px);
        background: linear-gradient(135deg, #4018ff 0%, #7818ff 58%, #5000d8 100%);
        box-shadow:
          0 0 1.3cqw rgba(106, 35, 255, 0.85),
          inset 0 0 0.4cqw rgba(255, 255, 255, 0.17);
      }

      .catalog-reference .products {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1.15cqw 1.55cqw;
        margin: 0 0.15cqw;
      }

      .catalog-reference .product {
        aspect-ratio: 1 / 1.01;
        grid-template-rows: 72% 28%;
        padding: 0.65cqw;
        border: 0;
        overflow: visible;
        isolation: isolate;
        clip-path: none;
        background:
          radial-gradient(circle at 50% 42%, rgba(92, 0, 168, 0.2), transparent 57%),
          #010101;
        box-shadow: none;
      }

      .catalog-reference .product::after {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 4;
        pointer-events: none;
        background: url("../../assets/china-catalog-ui/product-card-frame-slim.png?v=product-frame-slim-20260628") center / 100% 100% no-repeat;
      }

      .catalog-reference .product-media {
        z-index: 1;
        background:
          radial-gradient(circle at 50% 50%, rgba(93, 0, 158, 0.2), transparent 58%),
          #030204;
      }

      .catalog-reference .product-media::before {
        opacity: 0.48;
        background:
          linear-gradient(25deg, transparent 41%, rgba(122, 28, 255, 0.58) 42%, transparent 46%),
          linear-gradient(-24deg, transparent 52%, rgba(55, 0, 145, 0.58) 53%, transparent 57%);
      }

      .catalog-reference .product-media img {
        object-fit: cover;
      }

      .catalog-reference .product-info {
        z-index: 1;
        gap: 1.05cqw;
        padding: 0.95cqw 2.45cqw 1.35cqw;
        background: rgba(0, 0, 0, 0.9);
      }

      .catalog-reference .product-desc {
        font-size: clamp(12px, 2.78cqw, 20.5px);
        line-height: 1.08;
        color: rgba(255, 255, 255, 0.78);
      }

      .catalog-reference .product-meta {
        gap: 1.35cqw;
      }

      .catalog-reference .price {
        font-size: clamp(17px, 3.72cqw, 27.5px);
        font-weight: 400;
      }

      .catalog-reference .code {
        font-size: clamp(15px, 3.15cqw, 23.2px);
        letter-spacing: 0.12cqw;
      }

      .catalog-reference ~ .bottom-nav {
        width: min(100%, 738px);
        min-height: 13.4cqw;
        grid-template-columns: repeat(4, 10.2cqw);
        justify-content: end;
        gap: 1.35cqw;
        padding: 1.2cqw 2.2cqw max(0.9cqw, env(safe-area-inset-bottom));
        background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.84) 26%, rgba(0, 0, 0, 0.97));
      }

      .catalog-reference ~ .bottom-nav .nav-link {
        font-size: clamp(10px, 2cqw, 14.8px);
        line-height: 1.1;
      }

      .catalog-reference ~ .bottom-nav .nav-icon {
        width: 5.65cqw;
        height: 5.65cqw;
        margin-bottom: 0.75cqw;
        border-width: 0.16cqw;
        font-size: clamp(18px, 4.3cqw, 31.5px);
      }

      @media (max-width: 380px) {
        .catalog {
          padding-left: 10px;
          padding-right: 10px;
        }

        .filters {
          gap: 7px 7px;
        }

        .filter-button {
          font-size: 13px;
        }

        .product-info {
          padding-left: 7px;
          padding-right: 7px;
        }
      }
    </style>
  </head>
  <body>
    <main class="catalog" aria-label="商品列表">
      <h1 class="title" id="pageTitle">内裤</h1>
      <nav class="filters" id="filterLayer" aria-label="商品小分类"></nav>

      <form class="search" id="searchForm">
        <label class="search-field">
          <span class="search-icon" aria-hidden="true"></span>
          <input id="searchInput" type="search" placeholder="搜索你想要的商品" autocomplete="off">
        </label>
        <button type="submit">搜索</button>
      </form>

      <section class="products" id="productGrid" aria-label="商品"></section>
    </main>

    <nav class="bottom-nav" aria-label="底部操作">
      <a class="nav-link" href="../">
        <span class="nav-icon">‹</span>
        返回上一页
      </a>
      <a class="nav-link" href="#member">
        <span class="nav-icon">♙</span>
        会员登录
      </a>
      <a class="nav-link" href="#service">
        <span class="nav-icon">◌</span>
        客服
      </a>
      <a class="nav-link" href="#cart">
        <span class="nav-icon">⌑</span>
        购物车
      </a>
    </nav>

    <script src="../../assets/china-catalog-data.js?v=product-detail-20260628"></script>
    <script>
      const pages = window.CHINA_CATALOG_DATA;


      const params = new URLSearchParams(window.location.search);
      const requestedCategory = params.get("category") || "panty";
      const category = pages[requestedCategory] ? requestedCategory : "panty";
      const page = pages[category];
      document.body.dataset.category = category;
      const title = document.getElementById("pageTitle");
      const catalog = document.querySelector(".catalog");
      const filters = document.getElementById("filterLayer");
      const grid = document.getElementById("productGrid");
      const searchForm = document.getElementById("searchForm");
      const searchInput = document.getElementById("searchInput");
      const requestedFilter = params.get("filter");
      let activeFilter = page.filters.includes(requestedFilter) ? requestedFilter : page.active;

      document.title = `${page.title} | Secret Language Trade`;
      title.textContent = page.title;
      catalog.dataset.category = category;
      catalog.classList.add("catalog-reference");
      filters.className = `filters cols-${page.columns}`;

      function updateFilter(filter) {
        activeFilter = filter;
        filters.querySelectorAll(".filter-button").forEach((button) => {
          const selected = button.dataset.filter === activeFilter;
          button.classList.toggle("is-active", selected);
          button.setAttribute("aria-pressed", selected ? "true" : "false");
        });
        const nextUrl = new URL(window.location.href);
        nextUrl.searchParams.set("category", category);
        nextUrl.searchParams.set("filter", activeFilter);
        history.replaceState(null, "", nextUrl);
      }

      page.filters.forEach((filter) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "filter-button";
        button.dataset.filter = filter;
        const label = document.createElement("span");
        label.className = "filter-label";
        label.textContent = filter;
        button.append(label);
        button.setAttribute("aria-pressed", filter === activeFilter ? "true" : "false");
        if (filter === activeFilter) {
          button.classList.add("is-active");
        }
        button.addEventListener("click", () => updateFilter(filter));
        filters.append(button);
      });

      page.products.forEach((product, index) => {
        const [desc, price, code] = product;
        const item = document.createElement("a");
        item.className = "product";
        item.href = `../product/?category=${category}&item=${index + 1}&v=product-detail-20260628`;
        item.innerHTML = `
          <div class="product-media">
            <img src="../../assets/china-product-items/${category}-${index + 1}.jpg?v=editable-catalog-20260628" alt="${desc}">
          </div>
          <div class="product-info">
            <div class="product-desc">${desc}</div>
            <div class="product-meta">
              <span class="price">${price}</span>
              <span class="code">${code}</span>
            </div>
          </div>
        `;
        item.addEventListener("click", () => {
          grid.querySelectorAll(".product").forEach((card) => card.classList.remove("is-active"));
          item.classList.add("is-active");
        });
        grid.append(item);
      });

      searchForm.addEventListener("submit", (event) => {
        event.preventDefault();
        const nextUrl = new URL(window.location.href);
        nextUrl.searchParams.set("category", category);
        if (searchInput.value.trim()) {
          nextUrl.searchParams.set("q", searchInput.value.trim());
        } else {
          nextUrl.searchParams.delete("q");
        }
        history.replaceState(null, "", nextUrl);
      });
    </script>
  </body>
</html>
