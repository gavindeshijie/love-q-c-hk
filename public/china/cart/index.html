          qty: Math.max(1, Number.parseInt(entry.qty || "1", 10) || 1),
          selected: entry.selected !== false,
          image: `../../assets/china-product-items/${category}-${safeItem}.jpg?v=${VERSION}`
        };
      };

      const readCart = () => {
        try {
          const stored = JSON.parse(localStorage.getItem("loveCart") || "[]");
          if (Array.isArray(stored) && stored.length) {
            return stored.map(enrichCartItem);
          }
        } catch (error) {
          localStorage.removeItem("loveCart");
        }
        return fallbackItems.map((item) => ({ ...item }));
      };

      const persistCart = () => {
        const stored = state.items.map((item) => ({
          category: item.category,
          item: item.item,
          code: item.code,
          price: item.price,
          qty: item.qty,
          selected: item.selected,
          title: item.title
        }));
        localStorage.setItem("loveCart", JSON.stringify(stored));
      };

      const state = {
        items: readCart()
      };

      const cartList = document.getElementById("cartList");
      const totalPrice = document.getElementById("totalPrice");
      const selectAll = document.getElementById("selectAll");

      const iconTrash = `
        <svg viewBox="0 0 64 64" aria-hidden="true">
          <path d="M21 20h22"></path>
          <path d="M27 20v-5h10v5"></path>
          <path d="M24 25.5 26 50h12l2-24.5"></path>
          <path d="M30 31v13M36 31v13"></path>
        </svg>
      `;

      const render = () => {
        cartList.innerHTML = "";
        if (!state.items.length) {
          cartList.innerHTML = `<div class="empty-state">购物车为空，返回上一页继续选择商品。</div>`;
        }

        state.items.forEach((item, index) => {
          const subtotal = parsePrice(item.price) * item.qty;
          const card = document.createElement("article");
          card.className = `cart-item${item.selected ? " is-selected" : ""}`;
          card.innerHTML = `
            <button class="select-dot" type="button" data-action="toggle" data-index="${index}" aria-label="选择 ${item.title}" aria-pressed="${item.selected ? "true" : "false"}"></button>
            <div class="item-thumb"><img src="${item.image}" alt="${item.title}"></div>
            <div class="item-main">
              <h2 class="item-title">${item.title}</h2>
              <div class="item-code-row">
                <span class="item-code">${item.code}</span>
                <span class="unit-price">单价：${formatPrice(parsePrice(item.price))}</span>
              </div>
              <div class="item-control-row">
                <div class="qty" aria-label="数量">
                  <button type="button" data-action="minus" data-index="${index}" aria-label="减少数量">-</button>
                  <span>${item.qty}</span>
                  <button type="button" data-action="plus" data-index="${index}" aria-label="增加数量">+</button>
                </div>
                <div class="subtotal">合计：${formatPrice(subtotal)}</div>
              </div>
            </div>
            <button class="trash" type="button" data-action="delete" data-index="${index}" aria-label="删除 ${item.title}">${iconTrash}</button>
          `;
          cartList.append(card);
        });

        const allSelected = state.items.length > 0 && state.items.every((item) => item.selected);
        selectAll.classList.toggle("is-selected", allSelected);
        selectAll.setAttribute("aria-pressed", allSelected ? "true" : "false");

        const total = state.items.reduce((sum, item) => {
          return item.selected ? sum + parsePrice(item.price) * item.qty : sum;
        }, 0);
        totalPrice.textContent = formatPrice(total);
        persistCart();
      };

      cartList.addEventListener("click", (event) => {
        const target = event.target.closest("[data-action]");
        if (!target) return;
        const index = Number.parseInt(target.dataset.index, 10);
        const item = state.items[index];
        if (!item) return;

        if (target.dataset.action === "toggle") {
          item.selected = !item.selected;
        }
        if (target.dataset.action === "minus") {
          item.qty = Math.max(1, item.qty - 1);
        }
        if (target.dataset.action === "plus") {
          item.qty += 1;
        }
        if (target.dataset.action === "delete") {
          state.items.splice(index, 1);
        }
        render();
      });

      selectAll.addEventListener("click", () => {
        const shouldSelect = !(state.items.length > 0 && state.items.every((item) => item.selected));
        state.items.forEach((item) => {
          item.selected = shouldSelect;
        });
        render();
      });

      render();
    </script>
  </body>
</html>
