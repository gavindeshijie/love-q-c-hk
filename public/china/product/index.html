    <script src="../../assets/china-catalog-data.js?v=ship-reminder-v1-20260628"></script>
    <script>
      const pages = window.CHINA_CATALOG_DATA;
      const currentVersion = "ship-reminder-v1-20260628";
      const params = new URLSearchParams(window.location.search);
      if (params.get("v") !== currentVersion) {
        params.set("v", currentVersion);
        window.history.replaceState(null, "", `${window.location.pathname}?${params.toString()}${window.location.hash}`);
      }
      const requestedCategory = params.get("category") || "panty";
      const category = pages[requestedCategory] ? requestedCategory : "panty";
      const page = pages[category];
      const requestedItem = Number.parseInt(params.get("item") || "1", 10);
      const itemIndex = Number.isFinite(requestedItem) ? Math.min(Math.max(requestedItem, 1), page.products.length) : 1;
      const [description, priceText, code] = page.products[itemIndex - 1];
      const imageSrc = `../../assets/china-product-items/${category}-${itemIndex}.jpg?v=${currentVersion}`;
      const cleanPrice = priceText.replace(/[^\d.]/g, "");
      const featureParts = description.split("|").map((part) => part.trim()).filter(Boolean);
      const featureIconSvg = [
        `<svg class="ui-icon" aria-hidden="true" viewBox="0 0 64 64"><path d="M13.5 48.5c7.2-18.5 20.1-30.2 38.2-35.2-2.8 17.3-15.1 29.4-36.8 36.3"></path><path d="M15 49c8.2-10.4 18-19.2 29.6-26.5"></path><path d="m25 39-7.1.9M31.4 33.4l-7.1.9M38.2 27.8l-6.7.8"></path></svg>`,
        `<svg class="ui-icon" aria-hidden="true" viewBox="0 0 64 64"><path d="M13 22c7-7 12 7 19 0s12 7 19 0"></path><path d="M13 33c7-7 12 7 19 0s12 7 19 0"></path><path d="M13 44c7-7 12 7 19 0s12 7 19 0"></path></svg>`,
        `<svg class="ui-icon" aria-hidden="true" viewBox="0 0 64 64"><path d="M32 51S14 39 14 25.5C14 18 19 14 25 14c4.1 0 6.1 2.2 7 4.1C32.9 16.2 35 14 39 14c6 0 11 4 11 11.5C50 39 32 51 32 51Z"></path></svg>`,
        `<svg class="ui-icon" aria-hidden="true" viewBox="0 0 64 64"><path d="M32 13.5v37"></path><path d="M20 24h24M20 40h24"></path><path d="m24 17-7 7 7 7M40 17l7 7-7 7"></path><path d="m24 33-7 7 7 7M40 33l7 7-7 7"></path></svg>`
      ];
      const featureSub = ["细腻面料", "轻盈不闷热", "精致设计", "日常不束缚"];
      const intro = `精选${featureParts.join("、")}设计，细腻纹理若隐若现，柔软面料贴合肌肤，带来轻盈透气的穿着体验。`;
      const backUrl = `../catalog/?category=${category}&v=${currentVersion}`;
      const heroIndexes = [itemIndex, (itemIndex % page.products.length) + 1, ((itemIndex + 1) % page.products.length) + 1];
      const heroImages = heroIndexes.map((index) => `../../assets/china-product-items/${category}-${index}.jpg?v=${currentVersion}`);

      document.body.dataset.category = category;
      document.title = `${code} | ${page.title} | Secret Language Trade`;
      document.getElementById("backLink").href = backUrl;
      document.getElementById("returnLink").href = backUrl;
      document.getElementById("productTitle").textContent = description;
      document.getElementById("productIntro").textContent = intro;
      document.getElementById("productAmount").textContent = cleanPrice;
      document.getElementById("productCode").textContent = code;
      document.getElementById("thumbImage").src = imageSrc;
      document.getElementById("thumbImage").alt = description;
      document.getElementById("heroImage").src = imageSrc;
      document.getElementById("heroImage").alt = description;
      document.getElementById("detailText").textContent = `${description}。商品编号 ${code}，当前价格 ${priceText}。可根据搭配需求选择数量并加入购物车。`;

      const featureRow = document.getElementById("featureRow");
      const paddedFeatures = [...featureParts];
      while (paddedFeatures.length < 4) paddedFeatures.push(page.title);
      paddedFeatures.slice(0, 4).forEach((label, index) => {
        const item = document.createElement("div");
        item.className = "feature";
        item.innerHTML = `
          <span class="feature-icon">${featureIconSvg[index]}</span>
          <span class="feature-copy">
            <span class="feature-title">${label}</span>
            <span class="feature-sub">${featureSub[index]}</span>
          </span>
        `;
        featureRow.append(item);
      });

      const detailGallery = document.getElementById("detailGallery");
      const galleryLabels = ["面料细节", "穿搭效果", "版型展示"];
      heroImages.forEach((src, index) => {
        const shot = document.createElement("figure");
        shot.className = "detail-shot";
        shot.innerHTML = `<img src="${src}" alt="${description} ${galleryLabels[index]}"><span>${galleryLabels[index]}</span>`;
        detailGallery.append(shot);
      });

      document.getElementById("addCart").addEventListener("click", (event) => {
        const button = event.currentTarget;
        const cart = JSON.parse(localStorage.getItem("loveCart") || "[]");
        cart.push({ category, item: itemIndex, code, price: priceText });
        localStorage.setItem("loveCart", JSON.stringify(cart));
        button.querySelector(".cart-label").textContent = "已加入购物车";
        button.classList.add("is-added");
      });

      document.getElementById("playButton").addEventListener("click", (event) => {
        const button = event.currentTarget;
        document.querySelector(".media-section").classList.toggle("is-playing");
        button.classList.toggle("is-playing");
        button.setAttribute("aria-pressed", button.classList.contains("is-playing") ? "true" : "false");
      });

      let activeHero = 0;
      let startX = 0;
      const heroStage = document.querySelector(".hero-stage");
      const heroImage = document.getElementById("heroImage");
      const setHero = (direction) => {
        activeHero = (activeHero + direction + heroImages.length) % heroImages.length;
        heroImage.src = heroImages[activeHero];
      };
      heroStage.addEventListener("touchstart", (event) => {
        startX = event.touches[0].clientX;
      }, { passive: true });
      heroStage.addEventListener("touchend", (event) => {
        const endX = event.changedTouches[0].clientX;
        const delta = endX - startX;
        if (Math.abs(delta) > 42) setHero(delta < 0 ? 1 : -1);
      });

      document.getElementById("menuButton").addEventListener("click", () => {
        window.location.hash = "detail";
      });
