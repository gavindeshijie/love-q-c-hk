<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>会员中心 | Secret Language Trade</title>
    <style>
      :root {
        color-scheme: dark;
        --panel: rgba(3, 5, 16, 0.88);
        --panel-2: rgba(9, 12, 28, 0.84);
        --line: rgba(220, 204, 255, 0.62);
        --line-soft: rgba(156, 129, 215, 0.28);
        --pink: #ff64f7;
        --purple: #8d31ff;
        --blue: #1e35ff;
        --text: rgba(255, 255, 255, 0.9);
        --muted: rgba(255, 255, 255, 0.58);
        --danger: #ff2f59;
        --frame-cut: polygon(3.1cqw 0, calc(100% - 3.1cqw) 0, 100% 3.1cqw, 100% calc(100% - 3.1cqw), calc(100% - 3.1cqw) 100%, 3.1cqw 100%, 0 calc(100% - 3.1cqw), 0 3.1cqw);
        --small-cut: polygon(1.1cqw 0, calc(100% - 1.1cqw) 0, 100% 1.1cqw, 100% calc(100% - 1.1cqw), calc(100% - 1.1cqw) 100%, 1.1cqw 100%, 0 calc(100% - 1.1cqw), 0 1.1cqw);
        font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #000;
      }

      body {
        color: var(--text);
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      button,
      a {
        -webkit-tap-highlight-color: transparent;
      }

      .member-page {
        container-type: inline-size;
        position: relative;
        width: min(100vw, 853px);
        min-height: max(100svh, min(1280px, 150.06cqw));
        margin: 0 auto;
        overflow: hidden;
        background:
          radial-gradient(circle at 51% 7%, rgba(83, 40, 255, 0.62), transparent 20cqw),
          radial-gradient(circle at 82% 23%, rgba(248, 57, 255, 0.2), transparent 26cqw),
          radial-gradient(circle at 37% 67%, rgba(31, 58, 255, 0.18), transparent 25cqw),
          linear-gradient(180deg, #010006 0%, #030009 48%, #000 100%);
        isolation: isolate;
      }

      .member-page::before,
      .member-page::after {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
        pointer-events: none;
      }

      .member-page::before {
        background:
          linear-gradient(90deg, transparent 0 7cqw, rgba(44, 59, 255, 0.17) 7cqw 7.2cqw, transparent 7.2cqw 92.8cqw, rgba(44, 59, 255, 0.17) 92.8cqw 93cqw, transparent 93cqw),
          radial-gradient(circle at 15% 82%, rgba(190, 55, 255, 0.26), transparent 12cqw),
          radial-gradient(circle at 91% 10%, rgba(50, 80, 255, 0.24), transparent 18cqw);
      }

      .member-page::after {
        background:
          linear-gradient(rgba(60, 65, 255, 0.1) 1px, transparent 1px),
          linear-gradient(90deg, rgba(162, 49, 255, 0.08) 1px, transparent 1px);
        background-size: 7cqw 7cqw;
        mask-image: linear-gradient(180deg, transparent, #000 28%, #000 78%, transparent);
        opacity: 0.45;
      }

      svg {
        fill: none;
        stroke: currentColor;
        stroke-width: 4;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .back-button {
        position: absolute;
        left: 1.8cqw;
        top: 2cqw;
        width: 11.9cqw;
        height: 8.6cqw;
        display: grid;
        place-items: center;
        color: #ffd7ff;
        border: 0.14cqw solid rgba(224, 208, 255, 0.78);
        border-radius: 0;
        clip-path: var(--small-cut);
        background:
          linear-gradient(90deg, rgba(33, 52, 255, 0.2), transparent 34%, rgba(255, 58, 255, 0.18)),
          rgba(11, 6, 24, 0.86);
        box-shadow:
          0 0 1.7cqw rgba(255, 60, 255, 0.58),
          inset 0 0 0 0.18cqw rgba(62, 83, 255, 0.22),
          inset 0 0 2.5cqw rgba(92, 52, 255, 0.32);
        text-decoration: none;
      }

      .back-button svg {
        width: 6.4cqw;
        height: 4.4cqw;
        stroke-width: 5;
      }

      .title-area {
        position: absolute;
        left: 18cqw;
        top: 2.3cqw;
        width: 66cqw;
        height: 14.2cqw;
        text-align: center;
      }

      .title-area::before,
      .title-area::after {
        content: "";
        position: absolute;
        top: 5.2cqw;
        width: 22cqw;
        height: 5.6cqw;
        border-top: 0.45cqw solid rgba(160, 91, 255, 0.82);
        border-bottom: 0.4cqw solid rgba(54, 78, 255, 0.65);
        transform: skewX(-24deg);
        filter: drop-shadow(0 0 0.9cqw rgba(103, 54, 255, 0.9));
      }

      .title-area::before {
        left: 1cqw;
      }

      .title-area::after {
        right: 1cqw;
        transform: skewX(24deg);
      }

      .crown {
        position: absolute;
        left: 50%;
        top: -1.4cqw;
        width: 10cqw;
        height: 4cqw;
        transform: translateX(-50%);
        color: #65a3ff;
        filter: drop-shadow(0 0 0.8cqw rgba(66, 70, 255, 0.95));
      }

      .title-area h1 {
        position: relative;
        z-index: 1;
        margin: 2.1cqw 0 0;
        color: white;
        font-size: clamp(42px, 9.5cqw, 88px);
        line-height: 0.92;
        font-weight: 900;
        letter-spacing: 0;
        -webkit-text-stroke: 0.45cqw rgba(88, 30, 150, 0.9);
        paint-order: stroke fill;
        text-shadow:
          0 0 0.8cqw rgba(255, 106, 255, 0.98),
          0 0 2.1cqw rgba(68, 75, 255, 0.85),
          0.45cqw 0.55cqw 0 rgba(41, 13, 104, 0.8);
      }

      .title-area p {
        position: relative;
        z-index: 1;
        margin: 0.5cqw 0 0;
        color: rgba(255, 255, 255, 0.78);
        font-size: clamp(10px, 1.85cqw, 16px);
        letter-spacing: 0;
        font-style: italic;
      }

      .side-shell {
        position: absolute;
        left: 1.2cqw;
        top: 18.6cqw;
        width: 17.1cqw;
        bottom: 8.9cqw;
        border: 0.12cqw solid rgba(221, 212, 255, 0.78);
        border-radius: 0;
        clip-path: var(--frame-cut);
        background:
          linear-gradient(90deg, rgba(80, 52, 255, 0.18), transparent 30%, rgba(245, 57, 255, 0.13)),
          repeating-linear-gradient(180deg, rgba(255, 255, 255, 0.06) 0 0.09cqw, transparent 0.09cqw 7.2cqw),
          radial-gradient(circle at 50% 86%, rgba(229, 54, 255, 0.36), transparent 12cqw),
          linear-gradient(180deg, rgba(8, 9, 21, 0.88), rgba(2, 4, 13, 0.74));
        box-shadow:
          inset 0 0 0 0.46cqw rgba(12, 16, 42, 0.94),
          inset 0 0 0 0.57cqw rgba(92, 76, 255, 0.2),
          inset 0 0 2.8cqw rgba(61, 55, 176, 0.42),
          0 0 1.7cqw rgba(105, 63, 255, 0.42);
        overflow: hidden;
      }

      .side-shell::before,
      .side-shell::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .side-shell::before {
        z-index: 2;
        background:
          linear-gradient(90deg, rgba(103, 255, 255, 0.86) 0 0.18cqw, transparent 0.18cqw calc(100% - 0.18cqw), rgba(245, 78, 255, 0.82) calc(100% - 0.18cqw) 100%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.9) 0 0.16cqw, transparent 0.16cqw calc(100% - 0.16cqw), rgba(255, 255, 255, 0.72) calc(100% - 0.16cqw) 100%);
        clip-path: var(--frame-cut);
        opacity: 0.5;
        filter: drop-shadow(0 0 0.55cqw rgba(89, 68, 255, 0.92));
      }

      .side-shell::after {
        z-index: 1;
        background:
          linear-gradient(180deg, transparent 0 62%, rgba(34, 48, 255, 0.34) 75%, rgba(245, 58, 255, 0.28) 100%),
          linear-gradient(120deg, transparent 0 44%, rgba(255, 60, 255, 0.2) 44.3% 45%, transparent 45.4%),
          linear-gradient(250deg, transparent 0 53%, rgba(59, 82, 255, 0.24) 53.3% 54%, transparent 54.4%);
      }

      .side-nav {
        position: relative;
        z-index: 3;
        display: grid;
        margin-top: 0.5cqw;
      }

      .side-tab {
        position: relative;
        width: 100%;
        height: 10.7cqw;
        display: grid;
        grid-template-columns: 5.4cqw 1fr;
        align-items: center;
        gap: 1.1cqw;
        padding: 0 1.7cqw;
        border: 0;
        border-bottom: 1px solid rgba(121, 105, 174, 0.2);
        background: transparent;
        color: rgba(255, 255, 255, 0.86);
        text-align: left;
        font-size: clamp(13px, 2.45cqw, 21px);
      }

      .side-tab svg {
        width: 3.7cqw;
        height: 3.7cqw;
        color: #ece5ff;
        filter: drop-shadow(0 0 0.7cqw rgba(126, 82, 255, 0.9));
      }

      .side-tab.is-active {
        background:
          linear-gradient(90deg, rgba(23, 42, 255, 0.96), rgba(141, 40, 255, 0.96) 62%, rgba(229, 54, 255, 0.68)),
          rgba(13, 10, 34, 0.94);
        box-shadow:
          inset 0 0 0 0.12cqw rgba(255, 255, 255, 0.18),
          inset 0 0 1.7cqw rgba(255, 255, 255, 0.18),
          0 0 1.8cqw rgba(74, 60, 255, 0.98);
      }

      .side-tab.is-active::before,
      .side-tab.is-active::after {
        content: "";
        position: absolute;
        pointer-events: none;
        inset: 0.18cqw;
        border: 0.16cqw solid rgba(238, 230, 255, 0.76);
        clip-path: var(--small-cut);
        filter: drop-shadow(0 0 0.65cqw rgba(255, 82, 255, 0.72));
      }

      .side-tab.is-active::after {
        inset: auto 0.6cqw 0.35cqw 0.6cqw;
        height: 0.2cqw;
        border: 0;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.85), transparent);
      }

      .vip-badge {
        position: absolute;
        z-index: 3;
        left: 1.35cqw;
        bottom: 3.6cqw;
        width: 14.5cqw;
        height: 22.6cqw;
        color: #ffe1ff;
        text-align: center;
        display: grid;
        place-items: end center;
        filter:
          drop-shadow(0 0 1.1cqw rgba(225, 55, 255, 0.86))
          drop-shadow(0 0 1.5cqw rgba(57, 92, 255, 0.7));
      }

      .vip-emblem {
        position: relative;
        width: 13.7cqw;
        height: 19.8cqw;
        display: grid;
        place-items: end center;
      }

      .vip-emblem::before,
      .vip-emblem::after {
        content: "";
        position: absolute;
        inset: 0;
        clip-path: polygon(50% 0, 68% 24%, 92% 18%, 79% 56%, 96% 70%, 66% 77%, 57% 100%, 43% 100%, 34% 77%, 4% 70%, 21% 56%, 8% 18%, 32% 24%);
      }

      .vip-emblem::before {
        background:
          radial-gradient(circle at 50% 16%, rgba(255, 255, 255, 0.88), transparent 5%),
          linear-gradient(145deg, rgba(43, 77, 255, 0.9), rgba(170, 37, 255, 0.95) 48%, rgba(255, 67, 246, 0.92));
        box-shadow:
          inset 0 0 1.8cqw rgba(255, 255, 255, 0.18),
          inset 0 -1cqw 2.6cqw rgba(0, 0, 0, 0.55);
      }

      .vip-emblem::after {
        inset: 0.42cqw;
        background:
          linear-gradient(75deg, transparent 0 28%, rgba(255, 255, 255, 0.75) 29% 31%, transparent 32% 100%),
          linear-gradient(180deg, transparent 0 48%, rgba(2, 4, 17, 0.86) 49% 100%);
        border: 0.12cqw solid rgba(230, 221, 255, 0.7);
      }

      .vip-gem {
        position: absolute;
        left: 2.2cqw;
        right: 2.2cqw;
        bottom: 6.2cqw;
        height: 6.2cqw;
        border: 0.12cqw solid rgba(227, 216, 255, 0.76);
        clip-path: var(--small-cut);
        background:
          linear-gradient(90deg, rgba(34, 62, 255, 0.45), rgba(255, 61, 245, 0.34)),
          rgba(4, 5, 17, 0.88);
        box-shadow: inset 0 0 1.3cqw rgba(229, 60, 255, 0.35), 0 0 1.2cqw rgba(111, 69, 255, 0.8);
        z-index: 1;
      }

      .vip-text {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 6.7cqw;
        z-index: 2;
        color: #ffd7ff;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(19px, 5.4cqw, 43px);
        font-weight: 900;
        letter-spacing: 0;
        line-height: 1;
        text-shadow:
          0 0 0.9cqw rgba(255, 67, 246, 0.98),
          0 0 1.4cqw rgba(66, 83, 255, 0.95),
          0.2cqw 0.25cqw 0 rgba(44, 6, 97, 0.9);
      }

      .main-shell {
        position: absolute;
        left: 20.2cqw;
        right: 2.2cqw;
        top: 20.2cqw;
        bottom: 8.9cqw;
        border: 0.13cqw solid rgba(232, 220, 255, 0.86);
        border-radius: 0;
        clip-path: var(--frame-cut);
        background:
          linear-gradient(90deg, rgba(51, 83, 255, 0.16), transparent 14%, transparent 83%, rgba(244, 55, 255, 0.14)),
          linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent 14%, transparent 84%, rgba(184, 72, 255, 0.1)),
          radial-gradient(circle at 70% 0%, rgba(198, 50, 255, 0.22), transparent 18cqw),
          linear-gradient(180deg, rgba(4, 6, 18, 0.92), rgba(3, 4, 13, 0.86));
        box-shadow:
          0 0 2.1cqw rgba(108, 61, 255, 0.54),
          inset 0 0 0 0.48cqw rgba(2, 5, 18, 0.92),
          inset 0 0 0 0.62cqw rgba(92, 81, 255, 0.18),
          inset 0 0 3.5cqw rgba(52, 70, 255, 0.22);
        overflow: hidden;
      }

      .main-shell::before,
      .main-shell::after {
        content: "";
        position: absolute;
        pointer-events: none;
      }

      .main-shell::before {
        inset: 0.55cqw;
        z-index: 2;
        pointer-events: none;
        border: 0.14cqw solid rgba(240, 236, 255, 0.72);
        clip-path: var(--frame-cut);
        box-shadow:
          inset 0 0 1.4cqw rgba(50, 66, 255, 0.18),
          0 0 0.9cqw rgba(83, 65, 255, 0.82);
      }

      .main-shell::after {
        inset: 0;
        z-index: 3;
        background:
          linear-gradient(90deg, transparent 0 2.6cqw, rgba(82, 255, 255, 0.82) 2.6cqw 7.5cqw, transparent 7.5cqw calc(100% - 7.5cqw), rgba(251, 68, 255, 0.78) calc(100% - 7.5cqw) calc(100% - 2.6cqw), transparent calc(100% - 2.6cqw)),
          linear-gradient(90deg, transparent 0 21%, rgba(255, 72, 255, 0.9) 21% 29%, transparent 29% 68%, rgba(72, 93, 255, 0.82) 68% 76%, transparent 76%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.8) 0 0.13cqw, transparent 0.13cqw calc(100% - 0.13cqw), rgba(255, 255, 255, 0.62) calc(100% - 0.13cqw) 100%);
        clip-path: var(--frame-cut);
        opacity: 0.66;
        filter:
          drop-shadow(0 0 0.55cqw rgba(255, 60, 255, 0.62))
          drop-shadow(0 0 0.7cqw rgba(52, 76, 255, 0.68));
      }

      .content {
        position: relative;
        z-index: 4;
        height: 100%;
        padding: 5.6cqw 5.2cqw 3.4cqw;
        overflow: auto;
        scrollbar-width: none;
      }

      .content::-webkit-scrollbar {
        display: none;
      }

      .footer-actions {
        position: absolute;
        left: 20.5cqw;
        right: 2.2cqw;
        bottom: 1.3cqw;
        display: flex;
        justify-content: flex-end;
        gap: 3.2cqw;
        align-items: center;
      }

      .footer-actions.is-profile {
        justify-content: space-between;
      }

      .neon-button {
        min-width: 12.2cqw;
        height: 6.4cqw;
        display: inline-grid;
        grid-auto-flow: column;
        align-items: center;
        justify-content: center;
        gap: 1cqw;
        padding: 0 2.6cqw;
        position: relative;
        border: 0.13cqw solid rgba(228, 219, 255, 0.74);
        border-radius: 0;
        clip-path: var(--small-cut);
        background:
          linear-gradient(90deg, rgba(48, 71, 255, 0.2), transparent 42%, rgba(255, 70, 255, 0.16)),
          rgba(5, 6, 18, 0.88);
        color: rgba(255, 255, 255, 0.86);
        text-decoration: none;
        font-size: clamp(12px, 2.15cqw, 18px);
        box-shadow:
          0 0 1.15cqw rgba(72, 76, 255, 0.65),
          inset 0 0 0 0.16cqw rgba(88, 74, 255, 0.18),
          inset 0 0 1.6cqw rgba(78, 54, 255, 0.22);
      }

      .neon-button.primary {
        background: linear-gradient(135deg, rgba(27, 41, 255, 0.95), rgba(118, 31, 255, 0.96) 55%, rgba(230, 56, 255, 0.85));
        color: #fff;
        box-shadow:
          0 0 1.65cqw rgba(166, 58, 255, 0.92),
          inset 0 0 0 0.16cqw rgba(255, 255, 255, 0.16),
          inset 0 0 1.45cqw rgba(255, 255, 255, 0.2);
      }

      .neon-button.icon-only {
        min-width: 11.8cqw;
        width: 11.8cqw;
        padding: 0;
      }

      .neon-button svg {
        width: 3.1cqw;
        height: 3.1cqw;
      }

      .field-grid {
        display: grid;
        grid-template-columns: 20cqw 1fr 1fr;
        column-gap: 3.7cqw;
        row-gap: 2.45cqw;
      }

      .avatar-block {
        grid-row: span 3;
        display: grid;
        justify-items: center;
        align-content: start;
        gap: 1.6cqw;
        padding-top: 1.2cqw;
      }

      .avatar-orb {
        width: 15.2cqw;
        height: 15.2cqw;
        border-radius: 50%;
        display: grid;
        place-items: center;
        color: rgba(187, 157, 255, 0.9);
        border: 0.18cqw solid rgba(240, 226, 255, 0.9);
        background:
          repeating-radial-gradient(circle, rgba(255, 255, 255, 0.16) 0 0.08cqw, transparent 0.08cqw 1.4cqw),
          radial-gradient(circle, rgba(91, 34, 190, 0.42), rgba(0, 0, 0, 0.78) 61%);
        box-shadow:
          0 0 2cqw rgba(95, 66, 255, 0.9),
          inset 0 0 0 0.44cqw rgba(0, 0, 0, 0.72),
          inset 0 0 2.2cqw rgba(199, 56, 255, 0.22);
      }

      .avatar-orb svg {
        width: 9.2cqw;
        height: 9.2cqw;
      }

      .upload-button {
        width: 14.5cqw;
        height: 4.1cqw;
        border: 0.12cqw solid rgba(205, 192, 255, 0.8);
        border-radius: 0;
        clip-path: var(--small-cut);
        background:
          linear-gradient(90deg, rgba(35, 52, 255, 0.36), transparent 52%, rgba(245, 67, 255, 0.2)),
          rgba(22, 31, 96, 0.62);
        color: #fff;
        box-shadow:
          0 0 0.9cqw rgba(66, 70, 255, 0.66),
          inset 0 0 1cqw rgba(77, 70, 255, 0.22);
        font-size: clamp(10px, 1.8cqw, 15px);
      }

      .field {
        min-width: 0;
      }

      .field.full {
        grid-column: 1 / -1;
      }

      .field.two {
        grid-column: span 2;
      }

      .field label {
        display: block;
        margin: 0 0 1cqw;
        color: rgba(255, 255, 255, 0.84);
        font-size: clamp(11px, 1.95cqw, 17px);
      }

      .required {
        color: #ff304c;
        font-weight: 700;
      }

      .input,
      .textarea,
      .select-face {
        position: relative;
        width: 100%;
        min-height: 5.4cqw;
        display: flex;
        align-items: center;
        gap: 1.2cqw;
        padding: 0 1.5cqw;
        border: 0.13cqw solid rgba(206, 48, 82, 0.5);
        border-radius: 0;
        clip-path: var(--small-cut);
        background:
          linear-gradient(90deg, rgba(235, 45, 100, 0.09), transparent 28%, transparent 73%, rgba(114, 61, 255, 0.1)),
          rgba(2, 3, 12, 0.72);
        color: rgba(255, 255, 255, 0.72);
        box-shadow:
          inset 0 0 0 0.08cqw rgba(255, 255, 255, 0.03),
          inset 0 0 1.1cqw rgba(225, 41, 90, 0.12),
          0 0 0.45cqw rgba(255, 45, 130, 0.12);
        font-size: clamp(10px, 1.75cqw, 15px);
      }

      .input svg,
      .select-face svg {
        width: 2.5cqw;
        height: 2.5cqw;
        color: rgba(255, 255, 255, 0.78);
        flex: 0 0 auto;
      }

      .input input,
      .textarea textarea {
        width: 100%;
        border: 0;
        outline: 0;
        color: #fff;
        background: transparent;
        min-width: 0;
      }

      .input input::placeholder,
      .textarea textarea::placeholder {
        color: rgba(255, 255, 255, 0.36);
      }

      .textarea {
        min-height: 8.3cqw;
        align-items: start;
        padding-top: 1.7cqw;
        position: relative;
      }

      .textarea textarea {
        resize: none;
        height: 4.5cqw;
      }

      .counter {
        position: absolute;
        right: 1.5cqw;
        bottom: 1cqw;
        color: rgba(255, 255, 255, 0.45);
      }

      .gender {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1.35cqw;

        if (item.id === "about") {
          content.innerHTML = `
            <section class="detail-panel">
              ${settingHead("关于我们", "Secret Language Trade 会员服务信息。")}
              <div class="settings-grid">
                ${settingSubcard("vip", "会员体系", "七折会员 / 三折会员 / VIP会员", "后续可扩展会员价格、权益与续费")}
                ${settingSubcard("pass", "服务承诺", "安全可靠、快速访问、多语言支持", "订单与沟通记录保留在会员中心")}
                ${settingSubcard("info", "当前版本", VERSION, "用于刷新手机缓存，确保加载最新页面")}
                ${settingSubcard("mail", "官方联系", "gavindeshijie@163.com", "结算与订单确认请以官方邮箱为准")}

          return;
        }
        if (item.id === "logout") {
          content.innerHTML = `
            <section class="detail-panel logout-confirm">

      function settingHead(title, copy) {
        return `
          <div class="panel-head">
            <div>
              <h2>${title}</h2>
              <p>${copy}</p>
            </div>
            <button class="frame-button" type="button" data-action="back-settings-list">${icons.gear}<span>返回设置</span></button>
          </div>
        `;
      }

      function settingSubcard(icon, title, value, copy, actionLabel = "") {
        return `
          <div class="settings-subcard">
            <div class="product-icon">${icons[icon]}</div>
            <div><strong>${escapeHtml(title)}</strong><span>${escapeHtml(value)}｜${escapeHtml(copy)}</span></div>
            ${actionLabel ? `<button class="small-button" type="button" data-action="setting-inline">${escapeHtml(actionLabel)}</button>` : `<svg class="chevron" viewBox="0 0 64 64"><path d="m24 14 18 18-18 18"></path></svg>`}
          </div>
        `;
      }

      function render() {
        renderNav();
        renderFooter();
        renderNotice();
        document.body.dataset.view = state.view;
        if (state.view === "profile") renderProfile();
        if (state.view === "orders") renderOrders();
        if (state.view === "messages") renderMessages();
        if (state.view === "settings") renderSettings();
      }

      function renderNotice() {
        const shouldShow = state.view === "orders" && state.status === "ship" && state.reminder;
        noticeLayer.innerHTML = shouldShow ? `
          <div class="reminder-toast" role="status" aria-live="polite">
            <div class="reminder-icon">
              <svg viewBox="0 0 64 64" aria-hidden="true"><path d="M17 33.5 27.6 44 48 21"></path></svg>
            </div>
            <div class="reminder-copy">
              <strong>您的提醒已收到，我们的工作人员会马上处理</strong>
              <span>我们会通过邮箱联系您，请记得开启邮箱来邮提醒。</span>
            </div>
          </div>
        ` : "";
      }

      function closeNotice() {
        state.reminder = false;
        noticeLayer.innerHTML = "";
      }

      function showFlash(copy, icon = icons.check) {
        clearTimeout(flashTimer);
        noticeLayer.innerHTML = `
          <div class="profile-flash" role="status" aria-live="polite">
            ${icon}<span>${escapeHtml(copy)}</span>
          </div>
        `;
        flashTimer = window.setTimeout(() => {
          noticeLayer.innerHTML = "";
        }, 2200);
      }

      function showActionPanel(title, bodyHtml) {
        clearTimeout(flashTimer);
        state.reminder = false;
        noticeLayer.innerHTML = `
          <section class="action-panel" role="dialog" aria-modal="false" aria-label="${escapeAttr(title)}">
            <button class="notice-close" type="button" data-action="close-notice" aria-label="关闭">
              <svg viewBox="0 0 64 64" aria-hidden="true"><path d="M20 20l24 24M44 20 20 44"></path></svg>
            </button>
            <h2>${escapeHtml(title)}</h2>
            ${bodyHtml}
          </section>
        `;
      }

      function findOrder(id) {
        return allOrders.find((order) => order.id === id);
      }

      function orderInfoHtml(order, extra = "") {
        return `
          <p><strong>${escapeHtml(order.name)}</strong>　${escapeHtml(statusLabels[order.status])}</p>
          <ul>
            <li>订单号：${escapeHtml(order.id)}</li>
            <li>下单时间：${escapeHtml(order.date)}</li>
            <li>订单金额：${escapeHtml(order.price)}</li>
            ${extra}
          </ul>
        `;
      }

      function updateOrderStatus(orderId, nextStatus, nextTab, title, copy) {
        allOrders = allOrders.map((order) => (
          order.id === orderId ? { ...order, status: nextStatus } : order
        ));
        state.query = "";
        setRoute("orders", nextTab);
        const order = findOrder(orderId);
        if (order) {
          showActionPanel(title, orderInfoHtml(order, `<li>${escapeHtml(copy)}</li>`));
        }
      }

      function handleOrderAction(actionName, orderId) {
        const order = findOrder(orderId);
        if (!order && actionName !== "delete-order") return;

        if (actionName === "pay-now") {
          showActionPanel("付款提示", `
            ${orderInfoHtml(order, `<li>请进入结算中心完成付款，付款完成后订单会转入待发货。</li>`)}
            <p><a class="small-button primary" href="../checkout/?v=${VERSION}">前往结算中心</a></p>
          `);
          return;
        }

        if (actionName === "cancel-order") {
          updateOrderStatus(orderId, "cancel", "cancel", "订单已取消", "该订单已移动到已取消分类。");
          return;
        }

        if (actionName === "view-detail") {
          showActionPanel("订单详情", orderInfoHtml(order, `<li>商品数量：x1</li><li>当前处理状态：${statusLabels[order.status]}</li>`));
          return;
        }

        if (actionName === "view-logistics") {
          showActionPanel("物流记录", orderInfoHtml(order, `
            <li>物流状态：运输中</li>
            <li>最新记录：包裹已到达目的地分拨中心。</li>
            <li>预计送达：24小时内完成派送。</li>
          `));
          return;
        }

        if (actionName === "confirm-receive") {
          updateOrderStatus(orderId, "done", "done", "确认收货成功", "该订单已移动到已完成分类。");
          return;
        }

        if (actionName === "buy-again") {
          showActionPanel("再次购买", `
            ${orderInfoHtml(order, `<li>该商品已准备重新加入购物车。</li>`)}
            <p><a class="small-button primary" href="../cart/?v=${VERSION}">进入购物车</a></p>
          `);
          return;
        }

        if (actionName === "delete-order") {
          allOrders = allOrders.filter((item) => item.id !== orderId);
          render();
          showFlash("已删除取消订单记录", icons.cross);
        }
      }

      function collectProfileForm() {
        const form = document.getElementById("profileForm");
        const nextProfile = { ...profileDraft };
        if (!form) return nextProfile;
        form.querySelectorAll("input[name], textarea[name]").forEach((fieldEl) => {
          nextProfile[fieldEl.name] = fieldEl.value.trim();
        });
        const selectedGender = form.querySelector(".choice.is-active");
        if (selectedGender) nextProfile.gender = selectedGender.dataset.gender || selectedGender.textContent.trim();
        return nextProfile;
      }

      function saveProfile() {
        const nextProfile = collectProfileForm();
        writeProfileDraft(nextProfile);
        showFlash("会员信息已保存，可继续编辑");
      }

      function resetProfile() {
        writeProfileDraft({});
        renderProfile();
        showFlash("会员信息已重置", icons.reset);
      }

      function cycleProfileValue(key, values, copy) {
        const current = collectProfileForm();
        const active = current[key] || values[0];
        const index = values.indexOf(active);
        current[key] = values[(index + 1) % values.length];
        writeProfileDraft(current);
        renderProfile();
        showFlash(`${copy}：${current[key]}`);
      }

      function showMessagePanel(messageId) {
        const message = messages.find((item) => item.id === messageId);
        if (!message) return;
        setMessageRoute(messageId);
      }

      function showSettingPanel(panelId) {
        if (panelId === "notice") {
          state.notice = !state.notice;
          renderSettings();
          showFlash(state.notice ? "消息通知已开启" : "消息通知已关闭", icons.bell);
          return;
        }
        setSettingRoute(panelId);
      }

      document.addEventListener("click", (event) => {
        const viewButton = event.target.closest("[data-view]");
        if (viewButton) {
          state.query = "";
          setRoute(viewButton.dataset.view, viewButton.dataset.view === "orders" ? "all" : state.status);
          return;
        }
        const statusButton = event.target.closest("[data-status]");
        if (statusButton) {
          state.query = "";
          setRoute("orders", statusButton.dataset.status);
          return;
        }
        const choice = event.target.closest(".choice");
        if (choice) {
          choice.parentElement.querySelectorAll(".choice").forEach((button) => button.classList.remove("is-active"));
          choice.classList.add("is-active");
          return;
        }
        const toggle = event.target.closest(".toggle");
        if (toggle) {
          state.notice = toggle.getAttribute("aria-pressed") !== "true";
          toggle.setAttribute("aria-pressed", state.notice ? "true" : "false");
          showFlash(state.notice ? "消息通知已开启" : "消息通知已关闭", icons.bell);
          return;
        }
        const messageCard = event.target.closest("[data-message-id]");
        if (messageCard) {
          showMessagePanel(messageCard.dataset.messageId);
          return;
        }
        const settingCard = event.target.closest("[data-setting]");
        if (settingCard && !event.target.closest(".toggle")) {
          showSettingPanel(settingCard.dataset.setting);
          return;
        }
        const action = event.target.closest("[data-action]");
        if (action) {
          const actionName = action.dataset.action;
          if (actionName === "close-notice") {
            closeNotice();
            return;
          }
          if (action.dataset.action === "remind-ship") {
            setRoute("orders", "ship", { reminder: true });
            return;
          }
          if (["pay-now", "cancel-order", "view-detail", "view-logistics", "confirm-receive", "buy-again", "delete-order"].includes(actionName)) {
            handleOrderAction(actionName, action.dataset.orderId);
            return;
          }
          if (actionName === "reset") {
            resetProfile();
            return;
          }
          if (actionName === "save") {
            saveProfile();
            const label = action.querySelector("span");
            if (label) label.textContent = "已保存";
            return;
          }
          if (actionName === "select-level") {
            cycleProfileValue("level", ["七折会员", "三折会员", "VIP会员"], "会员等级");
            return;
          }
          if (actionName === "select-country") {
            cycleProfileValue("country", ["中国大陆", "新加坡", "泰国", "越南", "马来西亚", "老挝"], "国家/地区");
            return;
          }
          if (actionName === "upload-avatar") {
            showFlash("头像入口已打开，后续可接入真实上传");
            return;
          }
          if (actionName === "filter") {
            showActionPanel("筛选", `<p>当前列表已支持顶部分类和搜索框筛选。后续可以在这里接入更多筛选条件。</p>`);
            return;
          }
          if (actionName === "back-message-list") {
            state.messageId = "";
            setRoute("messages", state.status);
            return;
          }
          if (actionName === "back-settings-list") {
            state.settingPanel = "";
            setRoute("settings", state.status);
            return;
          }
          if (actionName === "send-message-reply") {
            showFlash("回复已写入沟通记录", icons.chat);
            return;
          }
          if (actionName === "save-security") {
            showFlash("账户安全设置已保存", icons.check);
            return;
          }
          if (actionName === "submit-feedback") {
            showFlash("反馈已提交，客服会在沟通记录中回复", icons.check);
            return;
          }
          if (actionName === "setting-inline") {
            showFlash("该设置入口已打开，可继续接入真实流程", icons.gear);
            return;
          }
          if (actionName === "open-support") {
            window.location.href = `../support/?v=${VERSION}`;
          }
        }
      });

      document.addEventListener("input", (event) => {
        if (event.target.id === "searchInput") {
          state.query = event.target.value.trim();
          if (state.view === "orders") renderOrders();
          if (state.view === "messages") renderMessages();
        }
        if (event.target.tagName === "TEXTAREA") {
          const counter = document.querySelector(".counter");
          if (counter) counter.textContent = `${event.target.value.length}/500`;
        }
      });

      window.addEventListener("popstate", () => {
        const next = new URLSearchParams(window.location.search);
        state.view = next.get("view") || "profile";
        state.status = next.get("status") || "all";
        state.reminder = next.get("remind") === "1";
        state.messageId = next.get("message") || "";
        state.settingPanel = next.get("panel") || "";
        state.query = "";
        render();
      });

      if (params.get("v") !== VERSION) {
        params.set("v", VERSION);
        params.set("view", state.view);
        if (state.view === "orders") params.set("status", state.status);
        if (state.reminder && state.view === "orders" && state.status === "ship") params.set("remind", "1");
        if (state.view === "messages" && state.messageId) params.set("message", state.messageId);
        if (state.view === "settings" && state.settingPanel) params.set("panel", state.settingPanel);
        window.history.replaceState(null, "", `${window.location.pathname}?${params.toString()}`);
      }

      render();
    </script>
  </body>
</html>
