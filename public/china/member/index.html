<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>会员中心 | Secret Language Trade</title>
    <style>
      :root {
        color-scheme: dark;
        --panel: rgba(3, 5, 16, 0.88);
        --panel-2: rgba(9, 12, 28, 0.84);
        --line: rgba(220, 204, 255, 0.62);
        --line-soft: rgba(156, 129, 215, 0.28);
        --pink: #ff64f7;
        --purple: #8d31ff;
        --blue: #1e35ff;
        --text: rgba(255, 255, 255, 0.9);
        --muted: rgba(255, 255, 255, 0.58);
        --danger: #ff2f59;
        font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #000;
      }

      body {
        color: var(--text);
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      button,
      a {
        -webkit-tap-highlight-color: transparent;
      }

      .member-page {
        container-type: inline-size;
        position: relative;
        width: min(100vw, 853px);
        min-height: max(100svh, min(1280px, 150.06cqw));
        margin: 0 auto;
        overflow: hidden;
        background:
          radial-gradient(circle at 51% 7%, rgba(83, 40, 255, 0.62), transparent 20cqw),
          radial-gradient(circle at 82% 23%, rgba(248, 57, 255, 0.2), transparent 26cqw),
          radial-gradient(circle at 37% 67%, rgba(31, 58, 255, 0.18), transparent 25cqw),
          linear-gradient(180deg, #010006 0%, #030009 48%, #000 100%);
        isolation: isolate;
      }

      .member-page::before,
      .member-page::after {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
        pointer-events: none;
      }

      .member-page::before {
        background:
          linear-gradient(90deg, transparent 0 7cqw, rgba(44, 59, 255, 0.17) 7cqw 7.2cqw, transparent 7.2cqw 92.8cqw, rgba(44, 59, 255, 0.17) 92.8cqw 93cqw, transparent 93cqw),
          radial-gradient(circle at 15% 82%, rgba(190, 55, 255, 0.26), transparent 12cqw),
          radial-gradient(circle at 91% 10%, rgba(50, 80, 255, 0.24), transparent 18cqw);
      }

      .member-page::after {
        background:
          linear-gradient(rgba(60, 65, 255, 0.1) 1px, transparent 1px),
          linear-gradient(90deg, rgba(162, 49, 255, 0.08) 1px, transparent 1px);
        background-size: 7cqw 7cqw;
        mask-image: linear-gradient(180deg, transparent, #000 28%, #000 78%, transparent);
        opacity: 0.45;
      }

      svg {
        fill: none;
        stroke: currentColor;
        stroke-width: 4;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .back-button {
        position: absolute;
        left: 1.8cqw;
        top: 2cqw;
        width: 11.9cqw;
        height: 8.6cqw;
        display: grid;
        place-items: center;
        color: #ffd7ff;
        border: 1px solid rgba(224, 208, 255, 0.74);
        border-radius: 1.9cqw;
        background: rgba(11, 6, 24, 0.82);
        box-shadow: 0 0 1.4cqw rgba(255, 60, 255, 0.55), inset 0 0 2.3cqw rgba(92, 52, 255, 0.28);
        text-decoration: none;
      }

      .back-button svg {
        width: 6.4cqw;
        height: 4.4cqw;
        stroke-width: 5;
      }

      .title-area {
        position: absolute;
        left: 18cqw;
        top: 2.3cqw;
        width: 66cqw;
        height: 14.2cqw;
        text-align: center;
      }

      .title-area::before,
      .title-area::after {
        content: "";
        position: absolute;
        top: 5.2cqw;
        width: 22cqw;
        height: 5.6cqw;
        border-top: 0.45cqw solid rgba(160, 91, 255, 0.82);
        border-bottom: 0.4cqw solid rgba(54, 78, 255, 0.65);
        transform: skewX(-24deg);
        filter: drop-shadow(0 0 0.9cqw rgba(103, 54, 255, 0.9));
      }

      .title-area::before {
        left: 1cqw;
      }

      .title-area::after {
        right: 1cqw;
        transform: skewX(24deg);
      }

      .crown {
        position: absolute;
        left: 50%;
        top: -1.4cqw;
        width: 10cqw;
        height: 4cqw;
        transform: translateX(-50%);
        color: #65a3ff;
        filter: drop-shadow(0 0 0.8cqw rgba(66, 70, 255, 0.95));
      }

      .title-area h1 {
        position: relative;
        z-index: 1;
        margin: 2.1cqw 0 0;
        color: white;
        font-size: clamp(42px, 9.5cqw, 88px);
        line-height: 0.92;
        font-weight: 900;
        letter-spacing: 0;
        -webkit-text-stroke: 0.45cqw rgba(88, 30, 150, 0.9);
        paint-order: stroke fill;
        text-shadow:
          0 0 0.8cqw rgba(255, 106, 255, 0.98),
          0 0 2.1cqw rgba(68, 75, 255, 0.85),
          0.45cqw 0.55cqw 0 rgba(41, 13, 104, 0.8);
      }

      .title-area p {
        position: relative;
        z-index: 1;
        margin: 0.5cqw 0 0;
        color: rgba(255, 255, 255, 0.78);
        font-size: clamp(10px, 1.85cqw, 16px);
        letter-spacing: 0;
        font-style: italic;
      }

      .side-shell {
        position: absolute;
        left: 1.2cqw;
        top: 18.6cqw;
        width: 17.1cqw;
        bottom: 8.9cqw;
        border: 1px solid rgba(221, 212, 255, 0.6);
        border-radius: 1.9cqw;
        background:
          radial-gradient(circle at 50% 86%, rgba(229, 54, 255, 0.36), transparent 12cqw),
          linear-gradient(180deg, rgba(8, 9, 21, 0.88), rgba(2, 4, 13, 0.74));
        box-shadow: inset 0 0 2.1cqw rgba(61, 55, 176, 0.28), 0 0 1.3cqw rgba(105, 63, 255, 0.34);
        overflow: hidden;
      }

      .side-nav {
        display: grid;
        margin-top: 0.5cqw;
      }

      .side-tab {
        position: relative;
        width: 100%;
        height: 10.7cqw;
        display: grid;
        grid-template-columns: 5.4cqw 1fr;
        align-items: center;
        gap: 1.1cqw;
        padding: 0 1.7cqw;
        border: 0;
        border-bottom: 1px solid rgba(121, 105, 174, 0.2);
        background: transparent;
        color: rgba(255, 255, 255, 0.86);
        text-align: left;
        font-size: clamp(13px, 2.45cqw, 21px);
      }

      .side-tab svg {
        width: 3.7cqw;
        height: 3.7cqw;
        color: #ece5ff;
        filter: drop-shadow(0 0 0.7cqw rgba(126, 82, 255, 0.9));
      }

      .side-tab.is-active {
        background: linear-gradient(90deg, #172aff, #8d28ff 62%, rgba(229, 54, 255, 0.62));
        box-shadow: inset 0 0 1.3cqw rgba(255, 255, 255, 0.18), 0 0 1.4cqw rgba(74, 60, 255, 0.98);
      }

      .vip-badge {
        position: absolute;
        left: 1.8cqw;
        bottom: 4.7cqw;
        width: 13.4cqw;
        height: 18.5cqw;
        color: #ffe1ff;
        text-align: center;
        filter: drop-shadow(0 0 1.1cqw rgba(225, 55, 255, 0.85));
      }

      .vip-badge svg {
        width: 100%;
        height: 100%;
      }

      .main-shell {
        position: absolute;
        left: 20.2cqw;
        right: 2.2cqw;
        top: 20.2cqw;
        bottom: 8.9cqw;
        border: 1px solid rgba(232, 220, 255, 0.72);
        border-radius: 2.7cqw;
        background:
          radial-gradient(circle at 70% 0%, rgba(198, 50, 255, 0.22), transparent 18cqw),
          linear-gradient(180deg, rgba(4, 6, 18, 0.92), rgba(3, 4, 13, 0.86));
        box-shadow: 0 0 1.6cqw rgba(108, 61, 255, 0.42), inset 0 0 2.6cqw rgba(52, 70, 255, 0.16);
        overflow: hidden;
      }

      .main-shell::before,
      .main-shell::after {
        content: "";
        position: absolute;
        width: 11.5cqw;
        height: 11.5cqw;
        pointer-events: none;
        border: 0.5cqw solid rgba(228, 213, 255, 0.76);
        filter: drop-shadow(0 0 0.9cqw rgba(86, 59, 255, 0.9));
      }

      .main-shell::before {
        left: -0.35cqw;
        top: -0.35cqw;
        border-right: 0;
        border-bottom: 0;
        border-radius: 2.8cqw 0 0 0;
      }

      .main-shell::after {
        right: -0.35cqw;
        bottom: -0.35cqw;
        border-left: 0;
        border-top: 0;
        border-radius: 0 0 2.8cqw 0;
      }

      .content {
        position: relative;
        height: 100%;
        padding: 5.6cqw 5.2cqw 3.4cqw;
        overflow: auto;
        scrollbar-width: none;
      }

      .content::-webkit-scrollbar {
        display: none;
      }

      .footer-actions {
        position: absolute;
        left: 20.5cqw;
        right: 2.2cqw;
        bottom: 1.3cqw;
        display: flex;
        justify-content: flex-end;
        gap: 3.2cqw;
        align-items: center;
      }

      .footer-actions.is-profile {
        justify-content: space-between;
      }

      .neon-button {
        min-width: 12.2cqw;
        height: 6.4cqw;
        display: inline-grid;
        grid-auto-flow: column;
        align-items: center;
        justify-content: center;
        gap: 1cqw;
        padding: 0 2.6cqw;
        border: 1px solid rgba(228, 219, 255, 0.7);
        border-radius: 1.6cqw;
        background: rgba(5, 6, 18, 0.86);
        color: rgba(255, 255, 255, 0.86);
        text-decoration: none;
        font-size: clamp(12px, 2.15cqw, 18px);
        box-shadow: 0 0 1cqw rgba(72, 76, 255, 0.55), inset 0 0 1.5cqw rgba(78, 54, 255, 0.18);
      }

      .neon-button.primary {
        background: linear-gradient(135deg, rgba(27, 41, 255, 0.95), rgba(118, 31, 255, 0.96) 55%, rgba(230, 56, 255, 0.85));
        color: #fff;
        box-shadow: 0 0 1.4cqw rgba(166, 58, 255, 0.86), inset 0 0 1.3cqw rgba(255, 255, 255, 0.18);
      }

      .neon-button.icon-only {
        min-width: 11.8cqw;
        width: 11.8cqw;
        padding: 0;
      }

      .neon-button svg {
        width: 3.1cqw;
        height: 3.1cqw;
      }

      .field-grid {
        display: grid;
        grid-template-columns: 20cqw 1fr 1fr;
        column-gap: 3.7cqw;
        row-gap: 2.45cqw;
      }

      .avatar-block {
        grid-row: span 3;
        display: grid;
        justify-items: center;
        align-content: start;
        gap: 1.6cqw;
        padding-top: 1.2cqw;
      }

      .avatar-orb {
        width: 15.2cqw;
        height: 15.2cqw;
        border-radius: 50%;
        display: grid;
        place-items: center;
        color: rgba(187, 157, 255, 0.9);
        border: 1px solid rgba(240, 226, 255, 0.86);
        background: radial-gradient(circle, rgba(91, 34, 190, 0.42), rgba(0, 0, 0, 0.78) 61%);
        box-shadow: 0 0 1.8cqw rgba(95, 66, 255, 0.82), inset 0 0 2.1cqw rgba(199, 56, 255, 0.18);
      }

      .avatar-orb svg {
        width: 9.2cqw;
        height: 9.2cqw;
      }

      .upload-button {
        width: 14.5cqw;
        height: 4.1cqw;
        border: 1px solid rgba(205, 192, 255, 0.74);
        border-radius: 0.9cqw;
        background: rgba(22, 31, 96, 0.55);
        color: #fff;
        box-shadow: 0 0 0.8cqw rgba(66, 70, 255, 0.58);
        font-size: clamp(10px, 1.8cqw, 15px);
      }

      .field {
        min-width: 0;
      }

      .field.full {
        grid-column: 1 / -1;
      }

      .field.two {
        grid-column: span 2;
      }

      .field label {
        display: block;
        margin: 0 0 1cqw;
        color: rgba(255, 255, 255, 0.84);
        font-size: clamp(11px, 1.95cqw, 17px);
      }

      .required {
        color: #ff304c;
        font-weight: 700;
      }

      .input,
      .textarea,
      .select-face {
        width: 100%;
        min-height: 5.4cqw;
        display: flex;
        align-items: center;
        gap: 1.2cqw;
        padding: 0 1.5cqw;
        border: 1px solid rgba(206, 48, 82, 0.42);
        border-radius: 0.75cqw;
        background: rgba(2, 3, 12, 0.68);
        color: rgba(255, 255, 255, 0.72);
        box-shadow: inset 0 0 1cqw rgba(225, 41, 90, 0.08);
        font-size: clamp(10px, 1.75cqw, 15px);
      }

      .input svg,
      .select-face svg {
        width: 2.5cqw;
        height: 2.5cqw;
        color: rgba(255, 255, 255, 0.78);
        flex: 0 0 auto;
      }

      .input input,
      .textarea textarea {
        width: 100%;
        border: 0;
        outline: 0;
        color: #fff;
        background: transparent;
        min-width: 0;
      }

      .input input::placeholder,
      .textarea textarea::placeholder {
        color: rgba(255, 255, 255, 0.36);
      }

      .textarea {
        min-height: 8.3cqw;
        align-items: start;
        padding-top: 1.7cqw;
        position: relative;
      }

      .textarea textarea {
        resize: none;
        height: 4.5cqw;
      }

      .counter {
        position: absolute;
        right: 1.5cqw;
        bottom: 1cqw;
        color: rgba(255, 255, 255, 0.45);
      }

      .gender {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1.35cqw;
      }

      .choice {
        min-height: 5.4cqw;
        border: 1px solid rgba(206, 48, 82, 0.42);
        border-radius: 0.75cqw;
        background: rgba(2, 3, 12, 0.68);
        color: rgba(255, 255, 255, 0.8);
        font-size: clamp(10px, 1.8cqw, 15px);
      }

      .choice.is-active {
        background: linear-gradient(135deg, rgba(26, 35, 212, 0.82), rgba(126, 34, 255, 0.7));
        border-color: rgba(218, 198, 255, 0.8);
        box-shadow: 0 0 1cqw rgba(83, 64, 255, 0.8);
      }

      .social-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 2.4cqw 3cqw;
      }

      .orders-tabs {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 2.2cqw;
        margin: 0.3cqw 1cqw 3.4cqw;
      }

      .order-tab {
        border: 0;
        border-bottom: 0.25cqw solid transparent;
        padding: 0 0 1.2cqw;
        background: transparent;
        color: rgba(255, 255, 255, 0.82);
        font-size: clamp(11px, 2.05cqw, 18px);
      }

      .order-tab.is-active {
        color: #ffb6ff;
        border-color: #e95dff;
        text-shadow: 0 0 0.9cqw rgba(229, 76, 255, 0.85);
      }

      .search-row {
        display: grid;
        grid-template-columns: 1fr 16.1cqw;
        gap: 2.2cqw;
        margin-bottom: 2.4cqw;
      }

      .search-box {
        min-height: 5.2cqw;
        display: grid;
        grid-template-columns: 3.2cqw 1fr;
        align-items: center;
        gap: 1.2cqw;
        padding: 0 1.5cqw;
        border: 1px solid rgba(206, 48, 82, 0.28);
        border-radius: 0.8cqw;
        background: rgba(0, 0, 8, 0.58);
      }

      .search-box svg {
        width: 2.7cqw;
        height: 2.7cqw;
        color: rgba(255, 255, 255, 0.68);
      }

      .search-box input {
        min-width: 0;
        border: 0;
        outline: 0;
        color: #fff;
        background: transparent;
        font-size: clamp(10px, 1.8cqw, 15px);
      }

      .filter-button {
        min-height: 5.2cqw;
        display: grid;
        grid-template-columns: 1fr 2.1cqw;
        align-items: center;
        padding: 0 2cqw;
        border: 1px solid rgba(206, 48, 82, 0.28);
        border-radius: 0.8cqw;
        background: rgba(0, 0, 8, 0.58);
        color: rgba(255, 255, 255, 0.76);
        font-size: clamp(10px, 1.8cqw, 15px);
      }

      .orders-list,
      .message-list,
      .settings-list {
        display: grid;
        gap: 1.75cqw;
      }

      .order-card {
        position: relative;
        display: grid;
        grid-template-columns: 12.4cqw 1fr 22.2cqw;
        gap: 2.4cqw;
        min-height: 14.8cqw;
        padding: 1.9cqw;
        border: 1px solid rgba(123, 83, 169, 0.34);
        border-radius: 1cqw;
        background: rgba(11, 14, 30, 0.82);
        box-shadow: inset 0 0 1.2cqw rgba(52, 51, 157, 0.14);
      }

      .order-meta {
        grid-column: 1 / -1;
        display: grid;
        grid-template-columns: 1fr 1fr auto;
        gap: 2cqw;
        align-items: center;
        color: rgba(255, 255, 255, 0.66);
        font-size: clamp(10px, 1.74cqw, 15px);
      }

      .status {
        font-weight: 700;
        font-size: clamp(11px, 1.9cqw, 16px);
      }

      .status.pay {
        color: #ff3158;
      }

      .status.ship {
        color: #f4a834;
      }

      .status.receive {
        color: #a95cff;
      }

      .status.done {
        color: #57e45f;
      }

      .status.cancel {
        color: rgba(255, 255, 255, 0.48);
      }

      .product-icon {
        width: 9.9cqw;
        height: 9.9cqw;
        display: grid;
        place-items: center;
        border: 1px solid rgba(205, 190, 255, 0.62);
        border-radius: 0.8cqw;
        color: #e7d8ff;
        background: radial-gradient(circle, rgba(113, 41, 255, 0.43), rgba(4, 4, 16, 0.82) 68%);
        box-shadow: 0 0 1cqw rgba(88, 68, 255, 0.66), inset 0 0 1cqw rgba(232, 66, 255, 0.15);
      }

      .product-icon svg {
        width: 6.7cqw;
        height: 6.7cqw;
      }

      .order-name {
        margin: 0.7cqw 0 1.2cqw;
        font-size: clamp(12px, 2cqw, 18px);
      }

      .price {
        color: #ff304f;
        font-weight: 800;
        font-size: clamp(12px, 2cqw, 18px);
      }

      .order-actions {
        display: grid;
        align-self: end;
        justify-self: end;
        grid-template-columns: repeat(2, auto);
        gap: 1.3cqw;
        align-items: end;
      }

      .quantity {
        position: absolute;
        right: 2.1cqw;
        top: 7.7cqw;
        color: rgba(255, 255, 255, 0.82);
        font-size: clamp(11px, 1.8cqw, 16px);
      }

      .small-button {
        min-width: 10.8cqw;
        min-height: 4.4cqw;
        padding: 0 1.5cqw;
        border: 1px solid rgba(180, 161, 224, 0.56);
        border-radius: 0.65cqw;
        background: rgba(7, 8, 20, 0.78);
        color: rgba(255, 255, 255, 0.86);
        font-size: clamp(10px, 1.65cqw, 14px);
      }

      .small-button.primary {
        border-color: rgba(172, 93, 255, 0.74);
        background: linear-gradient(135deg, #282fff, #8a28ff);
        box-shadow: 0 0 1cqw rgba(112, 54, 255, 0.82);
      }

      .reminder-toast {
        position: absolute;
        left: 8.1cqw;
        top: 47.4cqw;
        z-index: 8;
        width: 84.4cqw;
        min-height: 14.4cqw;
        display: grid;
        grid-template-columns: 12.5cqw 1fr;
        align-items: center;
        gap: 1.2cqw;
        padding: 2.1cqw 4.3cqw 2.1cqw 4.9cqw;
        color: #fff;
        background:
          linear-gradient(135deg, transparent 0 2.1cqw, rgba(11, 12, 31, 0.94) 2.1cqw calc(100% - 2.1cqw), transparent calc(100% - 2.1cqw)),
          linear-gradient(180deg, rgba(41, 26, 86, 0.94), rgba(7, 9, 23, 0.96));
        border: 1px solid rgba(197, 90, 255, 0.74);
        border-radius: 0.6cqw;
        box-shadow:
          0 0 2.8cqw rgba(120, 43, 255, 0.72),
          inset 0 0 4.2cqw rgba(110, 43, 255, 0.46),
          inset 0 0 1px rgba(255, 255, 255, 0.5);
        clip-path: polygon(3.2cqw 0, calc(100% - 3.2cqw) 0, 100% 3.2cqw, 100% calc(100% - 3.2cqw), calc(100% - 3.2cqw) 100%, 3.2cqw 100%, 0 calc(100% - 3.2cqw), 0 3.2cqw);
      }

      .reminder-toast::before,
      .reminder-toast::after {
        content: "";
        position: absolute;
        pointer-events: none;
      }

      .reminder-toast::before {
        inset: 0;
        background:
          radial-gradient(circle at 11% 51%, rgba(138, 71, 255, 0.26), transparent 13cqw),
          linear-gradient(90deg, rgba(118, 43, 255, 0.12), transparent 36%, rgba(255, 52, 244, 0.12));
      }

      .reminder-toast::after {
        inset: 1px;
        border: 1px solid rgba(82, 53, 255, 0.48);
        clip-path: inherit;
      }

      .reminder-icon {
        position: relative;
        z-index: 1;
        width: 9.4cqw;
        height: 9.4cqw;
        display: grid;
        place-items: center;
        border: 0.55cqw solid rgba(197, 133, 255, 0.96);

        const visible = messages.filter((message) => {
          const text = `${message.type} ${message.id} ${message.copy}`;
          return !state.query || text.includes(state.query);
        });
        content.innerHTML = `
          ${searchRow("请输入订单号/商品名称/聊天关键词")}
          <div class="message-list">
            ${visible.map((message) => `
              <article class="message-card">
                <div class="product-icon">${icons[message.icon]}</div>
                <div>
                  <div class="message-meta"><strong class="message-title">${message.type}</strong><span>订单号：${message.id}</span></div>
                  <p class="message-copy">${message.copy}</p>
                </div>
                <div class="message-meta"><span>${message.date}</span>${message.unread ? `<span class="badge">${message.unread}</span>` : ""}</div>
              </article>
            `).join("")}
          </div>
        `;
      }

      function renderSettings() {
        const settings = [
          ["user", "账户与安全", "修改密码、绑定手机、账户安全管理", "link"],
          ["bell", "消息通知", "接收订单、活动、系统通知等消息", "toggle"],
          ["question", "帮助与反馈", "常见问题解答与意见反馈", "link"],
          ["info", "关于我们", "了解更多关于我们的信息", "link"],
          ["logout", "退出登录", "退出当前账号", "link"]
        ];
        content.innerHTML = `
          <div class="settings-list">
            ${settings.map(([icon, title, copy, type]) => `
              <article class="setting-card">
                <div class="product-icon">${icons[icon]}</div>
                <div><p class="setting-title">${title}</p><p class="setting-copy">${copy}</p></div>
                ${type === "toggle" ? `<button class="toggle" type="button" aria-pressed="${state.notice ? "true" : "false"}"><span></span></button>` : `<svg class="chevron" viewBox="0 0 64 64"><path d="m24 14 18 18-18 18"></path></svg>`}
              </article>
            `).join("")}
          </div>
        `;
      }

      function render() {
        renderNav();
        renderFooter();
        renderNotice();
        document.body.dataset.view = state.view;
        if (state.view === "profile") renderProfile();
        if (state.view === "orders") renderOrders();
        if (state.view === "messages") renderMessages();
        if (state.view === "settings") renderSettings();
      }

      function renderNotice() {
        const shouldShow = state.view === "orders" && state.status === "ship" && state.reminder;
        noticeLayer.innerHTML = shouldShow ? `
          <div class="reminder-toast" role="status" aria-live="polite">
            <div class="reminder-icon">
              <svg viewBox="0 0 64 64" aria-hidden="true"><path d="M17 33.5 27.6 44 48 21"></path></svg>
            </div>
            <div class="reminder-copy">
              <strong>您的提醒已收到，我们的工作人员会马上处理</strong>
              <span>我们会通过邮箱联系您，请记得开启邮箱来邮提醒。</span>
            </div>
          </div>
        ` : "";
      }

      document.addEventListener("click", (event) => {
        const viewButton = event.target.closest("[data-view]");
        if (viewButton) {
          state.query = "";
          setRoute(viewButton.dataset.view, viewButton.dataset.view === "orders" ? "all" : state.status);
          return;
        }
        const statusButton = event.target.closest("[data-status]");
        if (statusButton) {
          state.query = "";
          setRoute("orders", statusButton.dataset.status);
          return;
        }
        const choice = event.target.closest(".choice");
        if (choice) {
          choice.parentElement.querySelectorAll(".choice").forEach((button) => button.classList.remove("is-active"));
          choice.classList.add("is-active");
          return;
        }
        const toggle = event.target.closest(".toggle");
        if (toggle) {
          state.notice = toggle.getAttribute("aria-pressed") !== "true";
          toggle.setAttribute("aria-pressed", state.notice ? "true" : "false");
          return;
        }
        const action = event.target.closest("[data-action]");
        if (action) {
          if (action.dataset.action === "remind-ship") {
            setRoute("orders", "ship", { reminder: true });
            return;
          }
          if (action.dataset.action === "reset") {
            document.querySelectorAll("#profileForm input, #profileForm textarea").forEach((inputEl) => {
              inputEl.value = "";
            });
            const counter = document.querySelector(".counter");
            if (counter) counter.textContent = "0/500";
          }
          if (action.dataset.action === "save") {
            action.querySelector("span").textContent = "已保存";
          }
        }
      });

      document.addEventListener("input", (event) => {
        if (event.target.id === "searchInput") {
          state.query = event.target.value.trim();
          if (state.view === "orders") renderOrders();
          if (state.view === "messages") renderMessages();
        }
        if (event.target.tagName === "TEXTAREA") {
          const counter = document.querySelector(".counter");
          if (counter) counter.textContent = `${event.target.value.length}/500`;
        }
      });

      window.addEventListener("popstate", () => {
        const next = new URLSearchParams(window.location.search);
        state.view = next.get("view") || "profile";
        state.status = next.get("status") || "all";
        state.reminder = next.get("remind") === "1";
        state.query = "";
        render();
      });

      if (params.get("v") !== VERSION) {
        params.set("v", VERSION);
        params.set("view", state.view);
        if (state.view === "orders") params.set("status", state.status);
        if (state.reminder && state.view === "orders" && state.status === "ship") params.set("remind", "1");
        window.history.replaceState(null, "", `${window.location.pathname}?${params.toString()}`);
      }

      render();
    </script>
  </body>
</html>
